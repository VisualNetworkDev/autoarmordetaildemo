<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Auto Armor | Demo Control</title>
    <meta name="theme-color" content="#020305" />
    <style>
      :root {
        --bg: #020305;
        --panel: rgba(8, 13, 22, 0.9);
        --panel2: rgba(14, 20, 31, 0.86);
        --line: rgba(91, 178, 255, 0.25);
        --line2: rgba(255, 255, 255, 0.12);
        --text: #f6fbff;
        --muted: #a9b8ca;
        --blue: #087cff;
        --blue2: #5fc9ff;
        --purple: #895bff;
        --gold: #d8bf75;
        --red: #ff6578;
        --green: #58edb3;
        --r: 24px;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.68);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        min-height: 100%;
        overflow-x: hidden;
        overflow-y: auto;
        background: #020305;
        color: var(--text);
      }
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        letter-spacing: 0.01em;
      }
      body:before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -5;
        background:
          radial-gradient(
            circle at 14% -8%,
            rgba(8, 124, 255, 0.18),
            transparent 32%
          ),
          radial-gradient(
            circle at 94% 0,
            rgba(137, 91, 255, 0.13),
            transparent 30%
          ),
          linear-gradient(180deg, #07090f, #020305 70%, #000);
      }
      body:after {
        content: "";
        position: fixed;
        inset: -70px;
        z-index: -4;
        opacity: 0.34;
        background-image:
          linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.022) 25%,
            transparent 25%,
            transparent 50%,
            rgba(255, 255, 255, 0.022) 50%,
            rgba(255, 255, 255, 0.022) 75%,
            transparent 75%
          ),
          linear-gradient(
            -45deg,
            rgba(95, 201, 255, 0.024) 25%,
            transparent 25%,
            transparent 50%,
            rgba(95, 201, 255, 0.016) 50%,
            rgba(95, 201, 255, 0.016) 75%,
            transparent 75%
          );
        background-size:
          36px 36px,
          36px 36px;
        filter: contrast(145%);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
        background: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
      select option {
        background: #070d16;
        color: #fff;
      }
      input,
      select,
      textarea {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        outline: none;
        border-radius: 15px;
        background: linear-gradient(180deg, #0d1420, #060a11);
        color: #fff;
        padding: 12px 13px;
        font-size: 15px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }
      textarea {
        resize: vertical;
        min-height: 92px;
      }
      label {
        font-size: 12px;
        font-weight: 1000;
        text-transform: uppercase;
        color: #d9e6f5;
        letter-spacing: 0.06em;
      }
      .field {
        display: grid;
        gap: 7px;
      }
      .wide {
        grid-column: 1/-1;
      }
      .hidden {
        display: none !important;
      }
      .app {
        height: 100dvh;
        display: grid;
        grid-template-columns: 280px 1fr;
        max-width: 1440px;
        margin: 0 auto;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }
      .sidebar {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
        padding: 18px;
        border-right: 1px solid var(--line);
        background: rgba(3, 6, 11, 0.84);
        backdrop-filter: blur(16px);
      }
      .logo {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .shield {
        width: 46px;
        height: 46px;
        border-radius: 16px;
        border: 1px solid rgba(95, 201, 255, 0.52);
        display: grid;
        place-items: center;
        background: rgba(8, 124, 255, 0.12);
        box-shadow: 0 0 24px rgba(8, 124, 255, 0.2);
      }
      .brand b {
        display: block;
        font-size: 20px;
        font-weight: 1000;
      }
      .brand span {
        display: block;
        color: var(--blue2);
        font-size: 11px;
        font-weight: 1000;
        letter-spacing: 0.18em;
        margin-top: 4px;
      }
      .tabs {
        display: grid;
        gap: 8px;
        align-content: start;
        overflow: auto;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }
      .tab {
        width: 100%;
        text-align: left;
        padding: 13px 14px;
        border-radius: 16px;
        color: #d7e5f4;
        font-weight: 1000;
        text-transform: uppercase;
        font-size: 13px;
        letter-spacing: 0.055em;
        border: 1px solid transparent;
      }
      .tab.active {
        border-color: rgba(95, 201, 255, 0.55);
        background: linear-gradient(
          180deg,
          rgba(8, 124, 255, 0.22),
          rgba(8, 124, 255, 0.08)
        );
        box-shadow: 0 0 24px rgba(8, 124, 255, 0.12);
      }
      .quick {
        display: grid;
        gap: 10px;
      }
      .main {
        display: grid;
        grid-template-rows: auto 1fr;
        min-width: 0;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 16px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(3, 6, 11, 0.75);
        backdrop-filter: blur(16px);
      }
      .topbar h1 {
        font-size: 28px;
        line-height: 1;
        font-weight: 1000;
        text-transform: uppercase;
      }
      .topbar p {
        color: var(--muted);
        font-size: 13px;
        margin-top: 4px;
      }
      .top-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .content {
        overflow: auto;
        scrollbar-width: none;
        padding: 22px 22px calc(44px + env(safe-area-inset-bottom));
        min-height: 0;
      }
      .content::-webkit-scrollbar {
        display: none;
      }
      .view {
        display: none;
      }
      .view.active {
        display: block;
        animation: lift 0.25s ease both;
      }
      @keyframes lift {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .btn,
      .primary,
      .ghost,
      .danger,
      .ok,
      .gold {
        min-height: 42px;
        padding: 0 14px;
        border-radius: 14px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.055em;
        font-size: 13px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        white-space: nowrap;
      }
      .primary {
        background: linear-gradient(135deg, var(--blue), #0d65dd);
        box-shadow: 0 14px 38px rgba(8, 124, 255, 0.25);
      }
      .ghost {
        border: 1px solid var(--line2);
        background: rgba(255, 255, 255, 0.035);
      }
      .danger {
        background: linear-gradient(135deg, #ff4e68, #b51732);
      }
      .ok {
        background: linear-gradient(135deg, #25c987, #0d8b68);
      }
      .gold {
        background: linear-gradient(135deg, #d7be74, #8f7031);
        color: #080b10;
      }
      button[disabled],
      button.busy {
        opacity: 0.65;
        pointer-events: none;
        filter: saturate(0.85);
      }
      button.busy::after {
        content: "";
        width: 13px;
        height: 13px;
        border-radius: 50%;
        border: 2px solid currentColor;
        border-right-color: transparent;
        display: inline-block;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .mini {
        min-height: 34px;
        padding: 0 10px;
        font-size: 12px;
        border-radius: 12px;
      }
      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: var(--r);
        background: linear-gradient(
          180deg,
          rgba(11, 17, 27, 0.9),
          rgba(5, 9, 15, 0.84)
        );
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }
      .panel:before,
      .card:before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          135deg,
          rgba(95, 201, 255, 0.07),
          transparent 26%,
          rgba(137, 91, 255, 0.045)
        );
        opacity: 0.7;
      }
      .inner {
        position: relative;
        padding: 18px;
      }
      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 16px;
      }
      .section-head h2 {
        font-size: 28px;
        text-transform: uppercase;
        line-height: 1;
        font-weight: 1000;
      }
      .section-head p {
        color: var(--muted);
        font-size: 14px;
        margin-top: 6px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 11px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border: 1px solid rgba(95, 201, 255, 0.38);
        color: var(--blue2);
        background: rgba(8, 124, 255, 0.11);
      }
      .badge.green {
        border-color: rgba(88, 237, 179, 0.45);
        color: var(--green);
        background: rgba(88, 237, 179, 0.08);
      }
      .badge.red {
        border-color: rgba(255, 101, 120, 0.45);
        color: #ffadb8;
        background: rgba(255, 101, 120, 0.08);
      }
      .badge.gold {
        border-color: rgba(216, 191, 117, 0.48);
        color: var(--gold);
        background: rgba(216, 191, 117, 0.09);
      }
      .badge.purple {
        border-color: rgba(137, 91, 255, 0.52);
        color: #d2c2ff;
        background: rgba(137, 91, 255, 0.1);
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .two {
        grid-template-columns: 1fr 1fr;
      }
      .three {
        grid-template-columns: repeat(3, 1fr);
      }
      .four {
        grid-template-columns: repeat(4, 1fr);
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 13px;
      }
      .stat {
        padding: 16px;
      }
      .stat b {
        display: block;
        font-size: 28px;
      }
      .stat span {
        color: var(--muted);
        font-size: 13px;
        text-transform: uppercase;
        font-weight: 1000;
      }
      .list {
        display: grid;
        gap: 12px;
      }
      .booking-card {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr auto;
        gap: 14px;
        align-items: center;
        padding: 14px;
        border: 1px solid var(--line2);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.035);
      }
      .booking-card h3 {
        font-size: 18px;
      }
      .booking-card p {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .filters {
        display: flex;
        gap: 8px;
        overflow: auto;
        scrollbar-width: none;
        margin-bottom: 14px;
      }
      .filters::-webkit-scrollbar {
        display: none;
      }
      .filter {
        min-width: max-content;
        padding: 10px 12px;
        border-radius: 999px;
        border: 1px solid var(--line2);
        font-weight: 1000;
        font-size: 12px;
        text-transform: uppercase;
        color: var(--muted);
      }
      .filter.active {
        border-color: rgba(95, 201, 255, 0.55);
        color: #fff;
        background: rgba(8, 124, 255, 0.13);
      }
      .pkg-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
      .pkg-card .pkg-top {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: start;
      }
      .prices {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .price-line {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 7px;
      }
      .price-line span {
        color: #d8e6f5;
        font-size: 13px;
        text-transform: uppercase;
        font-weight: 900;
      }
      .features {
        display: grid;
        gap: 7px;
        margin-top: 12px;
      }
      .feature {
        display: grid;
        grid-template-columns: 20px 1fr;
        gap: 8px;
        color: #d5e4f3;
        font-size: 13px;
      }
      .feature i {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1px solid rgba(95, 201, 255, 0.42);
        background: rgba(8, 124, 255, 0.11);
        font-style: normal;
        color: var(--blue2);
        font-size: 11px;
        font-weight: 1000;
      }
      .editor {
        display: none;
        margin-top: 14px;
      }
      .editor.active {
        display: block;
      }
      .check-row {
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 9px;
        align-items: center;
        border: 1px solid var(--line2);
        border-radius: 14px;
        padding: 10px;
        background: rgba(255, 255, 255, 0.03);
      }
      .check-row input {
        min-height: auto;
        width: 20px;
        height: 20px;
        accent-color: var(--blue);
      }
      .check-row span {
        font-size: 13px;
        color: #dce9f8;
        font-weight: 800;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
      }
      .gallery-card img {
        height: 170px;
        object-fit: cover;
      }
      .gallery-card .inner {
        padding: 14px;
      }
      .preview-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      .preview-grid img {
        height: 160px;
        object-fit: cover;
        border-radius: 16px;
        border: 1px solid var(--line);
      }
      .upload-box {
        border: 1px dashed rgba(95, 201, 255, 0.45);
        border-radius: 18px;
        background: rgba(8, 124, 255, 0.06);
        padding: 14px;
        display: grid;
        gap: 10px;
      }
      .scanner-box {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        gap: 16px;
      }
      .video-wrap {
        border: 1px solid var(--line);
        border-radius: 20px;
        overflow: hidden;
        background: #000;
        min-height: 320px;
        display: grid;
        place-items: center;
      }
      .video-wrap video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .log {
        max-height: 280px;
        overflow: auto;
        display: grid;
        gap: 8px;
        scrollbar-width: none;
      }
      .log::-webkit-scrollbar {
        display: none;
      }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        place-items: center;
        background: rgba(0, 0, 0, 0.66);
        padding: 18px;
      }
      .modal.open {
        display: grid;
      }
      .modal-box {
        width: min(920px, 100%);
        max-height: 90vh;
        overflow: auto;
        scrollbar-width: none;
      }
      .modal-box::-webkit-scrollbar {
        display: none;
      }
      .drawer-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      .notice {
        border: 1px solid rgba(216, 191, 117, 0.38);
        background: rgba(216, 191, 117, 0.08);
        border-radius: 16px;
        padding: 13px;
        color: #f1dfad;
        font-size: 13px;
        line-height: 1.5;
      }
      .pay-card {
        border: 1px solid var(--line2);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.03);
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      .day-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .small-text {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 200;
        display: none;
        max-width: 360px;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: #07101c;
        box-shadow: var(--shadow);
        font-weight: 900;
      }
      .toast.show {
        display: block;
        animation: lift 0.2s ease both;
      }
      @media (max-width: 1050px) {
        .app {
          grid-template-columns: 1fr;
        }
        .sidebar {
          grid-template-rows: auto auto;
          gap: 10px;
        }
        .tabs {
          display: flex;
          overflow: auto;
        }
        .tab {
          width: auto;
          min-width: max-content;
        }
        .quick {
          display: none;
        }
        .topbar {
          padding: 14px;
        }
        .content {
          padding: 14px;
        }
        .two,
        .three,
        .four,
        .scanner-box {
          grid-template-columns: 1fr;
        }
        .pkg-grid,
        .gallery-grid {
          grid-template-columns: 1fr 1fr;
        }
        .booking-card {
          grid-template-columns: 1fr;
        }
        .actions {
          justify-content: flex-start;
        }
        .topbar h1 {
          font-size: 24px;
        }
      }
      @media (max-width: 560px) {
        .sidebar {
          padding: 12px;
        }
        .brand b {
          font-size: 18px;
        }
        .brand span {
          font-size: 10px;
        }
        .shield {
          width: 42px;
          height: 42px;
        }
        .topbar {
          display: grid;
        }
        .top-actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .top-actions .btn,
        .top-actions .primary,
        .top-actions .ghost {
          width: 100%;
        }
        .field-grid,
        .pkg-grid,
        .gallery-grid,
        .day-grid {
          grid-template-columns: 1fr;
        }
        .booking-card {
          padding: 12px;
        }
        .actions {
          display: grid;
          grid-template-columns: 1fr 1fr;
        }
        .actions button {
          width: 100%;
        }
        .btn,
        .primary,
        .ghost,
        .danger,
        .ok,
        .gold {
          font-size: 12px;
          min-height: 42px;
          padding: 0 11px;
        }
        .section-head {
          display: grid;
        }
        .section-head h2 {
          font-size: 24px;
        }
        .stat b {
          font-size: 24px;
        }
        .preview-grid {
          grid-template-columns: 1fr;
        }
        .video-wrap {
          min-height: 240px;
        }
      }
    
@media(max-width:1050px){
  html,body{height:auto;min-height:100%;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-y:auto;}
  .app{height:auto;min-height:100dvh;display:block;overflow:visible;}
  .sidebar{position:sticky;top:0;z-index:30;max-height:48dvh;overflow:auto;}
  .main{display:block;min-height:auto;overflow:visible;}
  .content{overflow:visible;min-height:auto;padding-bottom:calc(120px + env(safe-area-inset-bottom));}
  .modal-box{max-height:calc(100dvh - 36px);overflow:auto;-webkit-overflow-scrolling:touch;}
}
@media(max-width:560px){
  .content{padding-bottom:calc(150px + env(safe-area-inset-bottom));}
  .scanner-box{gap:12px;}
  .video-wrap{min-height:260px;}
}
</style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="logo">
          <div class="shield">🛡</div>
          <div class="brand"><b>AUTO ARMOR</b><span>DEMO CONTROL</span></div>
        </div>
        <nav class="tabs" id="tabs"></nav>
        <div class="quick">
          <button class="ghost" id="refreshBtn">Refresh Data</button>
        </div>
      </aside>
      <section class="main">
        <header class="topbar">
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <p>No password for demo. Customer page stays separate.</p>
          </div>
          <div class="top-actions">
            <button class="primary" data-tab="scanner">Scan QR</button
            ><button class="ghost" id="saveAllBtn">Save Current Section</button>
          </div>
        </header>
        <main class="content">
          <section id="dashboardView" class="view active"></section>
          <section id="bookingsView" class="view"></section>
          <section id="scannerView" class="view"></section>
          <section id="packagesView" class="view"></section>
          <section id="addonsView" class="view"></section>
          <section id="galleryView" class="view"></section>
          <section id="reviewsView" class="view"></section>
          <section id="couponsView" class="view"></section>
          <section id="availabilityView" class="view"></section>
          <section id="staffView" class="view"></section>
          <section id="settingsView" class="view"></section>
        </main>

      function api(action, params = {}) {
        return new Promise((resolve, reject) => {
          if (!API_URL) {
            reject(new Error("missing api"));
            return;
          }
          const cb = "aa_admin_" + Math.random().toString(36).slice(2);
          const q = new URLSearchParams({ action, callback: cb, ...params });
          const s = document.createElement("script");
          let done = false;
          const timer = setTimeout(() => {
            if (done) return;
            done = true;
            window[cb] = function () {};
            setTimeout(() => {
              try {
                delete window[cb];
              } catch (e) {}
            }, 60000);
            s.remove();
            reject(new Error("API timeout"));
          }, 30000);
          window[cb] = (res) => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            try {
              delete window[cb];
            } catch (e) {}
            s.remove();
            resolve(res);
          };
          s.onerror = () => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            window[cb] = function () {};
            setTimeout(() => {
              try {
                delete window[cb];
              } catch (e) {}
            }, 60000);
            s.remove();
            reject(new Error("API network error"));
          };
          s.src = API_URL + "?" + q.toString();
          document.body.appendChild(s);
        });
      }

      function startGpsShare(id) {
        if (!navigator.geolocation) {
          toast("GPS is not available on this device.");
          return;
        }
        stopGpsShare();
        gpsBookingId = id;
        gpsLastSent = 0;
        gpsWatchId = navigator.geolocation.watchPosition(
          (pos) => {
            const now = Date.now();
            const payload = {
              id,
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
            };
            data.tracking = [
              ...(data.tracking || []).filter((t) => String(t.bookingId) !== String(id)),
              { bookingId: id, ...payload, at: new Date().toLocaleString(), status: "On The Way" },
            ];
            if (now - gpsLastSent > 8000) {
              gpsLastSent = now;
              api("saveTracking", payload).catch(() => {});
            }
          },
          () => toast("GPS permission was not granted."),
          { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 },
        );
        toast("GPS sharing started for customer tracking.");
        if (active === "scanner") renderScanner();

      function stopGpsShare(message) {

        gpsWatchId = null;

      function parseQrValue(raw) {
        raw = String(raw || "").trim();
        if (!raw) return "";
        try { raw = decodeURIComponent(raw); } catch (e) {}
        try {
          if (/^https?:\/\//i.test(raw)) {
            const u = new URL(raw);
            return u.searchParams.get("qr") || u.searchParams.get("token") || u.searchParams.get("code") || u.searchParams.get("track") || u.searchParams.get("id") || raw;
          }
        } catch (e) {}
        return raw.replace(/^qr:/i, "").trim();
      }
      function findBookingByQrValue(value) {
        const clean = parseQrValue(value);
        return data.bookings.find((x) => String(x.qrData || "") === clean || String(x.id || "") === clean) || null;
      }
      async function startByCode(raw) {
        const token = parseQrValue(raw);
        if (!token) { toast("No QR value found."); return; }
        let b = findBookingByQrValue(token);
        let apiResult = null;
        try { apiResult = await api("validateQrStartService", { qr: token }); } catch (e) {}
        if (apiResult && apiResult.bookingId) b = data.bookings.find((x) => String(x.id) === String(apiResult.bookingId)) || b;
        if (!b) {
          toast("Secure QR not found in current bookings.");
          return;
        }
        scannedBookingId = b.id;
        stopCamera();
        if (String(b.status || "") === "Completed") {
          data.qrLogs = [{ id: "QR-" + Date.now(), bookingId: b.id, result: "Final receipt only", at: new Date().toLocaleString() }, ...(data.qrLogs || [])];
          renderScanner();
          toast("This QR now opens final receipt only.");
          return;
        }
        b.status = "Service Started";
        b.startedAt = b.startedAt || new Date().toISOString();
        updateBooking(b.id, b);
        data.qrLogs = [{ id: "QR-" + Date.now(), bookingId: b.id, result: "Service started by secure QR", at: new Date().toLocaleString() }, ...(data.qrLogs || [])];
        renderScanner();
        toast("Service opened from secure QR.");
      }
      async function openCamera() {
        const wrap = $("#videoWrap");
        try {
          if (!("mediaDevices" in navigator)) {
            toast("Camera not available on this device.");
            return;
          }
          stopCamera();
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
          wrap.innerHTML = '<video id="qrVideo" autoplay playsinline muted></video>';
          $("#qrVideo").srcObject = stream;
          toast("Camera opened. Point it at the customer confirmation QR.");
          if ("BarcodeDetector" in window) {
            detector = new BarcodeDetector({ formats: ["qr_code"] });
            scanTimer = setInterval(scanFrame, 650);
          } else {
            scanTimer = setInterval(scanFrameCanvas, 650);
          }
          if (active === "scanner") renderScanner();
        } catch (e) {
          toast("Camera permission failed or was denied.");
        }
      }
      async function scanFrame() {
        try {
          const v = $("#qrVideo");
          if (!v || !detector) return;
          const codes = await detector.detect(v);
          if (codes && codes.length) startByCode(codes[0].rawValue || "");
        } catch (e) {}
      }
      async function ensureJsQr() {
        if (window.jsQR) return true;
        if (!/^https?:/i.test(location.protocol)) return false;
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js";
          s.onload = resolve;
          s.onerror = reject;
          document.head.appendChild(s);
        }).catch(() => null);
        return !!window.jsQR;
      }
      async function scanFrameCanvas() {
        try {
          const v = $("#qrVideo");
          if (!v || !v.videoWidth || !(await ensureJsQr())) return;
          const c = document.createElement("canvas");
          c.width = v.videoWidth;
          c.height = v.videoHeight;
          const ctx = c.getContext("2d");
          ctx.drawImage(v, 0, 0, c.width, c.height);
          const img = ctx.getImageData(0, 0, c.width, c.height);
          const code = window.jsQR(img.data, c.width, c.height);
          if (code && code.data) startByCode(code.data);
        } catch (e) {}
      }
      function stopCamera() {
        if (scanTimer) clearInterval(scanTimer);
        scanTimer = null;
        detector = null;
        if (stream) {
          stream.getTracks().forEach((t) => t.stop());
          stream = null;
        }
        const wrap = $("#videoWrap");
        if (wrap) wrap.innerHTML = '<p class="small-text">Camera is off.</p>';
      }
      async function compressFile(file, max = 1350, q = 0.78) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const rd = new FileReader();
          rd.onload = () => {
            img.onload = () => {
              let w = img.width,
                h = img.height;
              if (Math.max(w, h) > max) {
                const r = max / Math.max(w, h);
                w = Math.round(w * r);
                h = Math.round(h * r);
              }
              const c = document.createElement("canvas");
              c.width = w;
              c.height = h;
              c.getContext("2d").drawImage(img, 0, 0, w, h);
              resolve(c.toDataURL("image/jpeg", q));
            };
            img.onerror = reject;
            img.src = rd.result;
          };
          rd.onerror = reject;
          rd.readAsDataURL(file);
        });
      }
      async function galleryFile(which, file) {
        if (!file) return;
        try {
          galleryDraft[which] = await compressFile(file);

        } catch (e) {
          toast("Could not read image.");
        }
      }

      function saveCoupon() {
        const c = {
          code: $("#couponCode").value.trim().toUpperCase(),

          () => {},

        toast("Coupon added.");

      function propose(id) {
        const date = $("#propDate").value,
          time = $("#propTime").value,
          reason = $("#propReason").value;
        if (!date || !time || !reason) {
          toast("Add date, time and reason.");
          return;
        }
        const proposal = {
          date,
          time,
          reason,
          status: "pending",
          createdAt: new Date().toISOString(),
        };
        updateBooking(id, { status: "Schedule Change Proposed", proposal });
        api("proposeSchedule", { id, date, time, reason }).catch(() => {});
        toast("Schedule option sent to customer tracking.");
      }
      function addExtra(id) {
        addExtraToBooking(id, $("#extraName")?.value || "Extra Service", Number($("#extraPrice")?.value || 0));
      }
      function addScannerExtra(id) {
        const b = data.bookings.find((x) => String(x.id) === String(id));
        if (!b || String(b.id) !== String(scannedBookingId) || String(b.status || "") === "Completed") {
          toast("Scan the customer's QR before adding on-site extras.");
          return;
        }
        const name = $("#scannerExtraName")?.value || "Extra Service";
        const price = Number($("#scannerExtraPrice")?.value || 0);
        addExtraToBooking(id, name, price);
        renderScanner();
      }
      function addExtraToBooking(id, name, price) {
        const b = data.bookings.find((x) => String(x.id) === String(id));
        if (!b) return;
        b.addonNames = [...(b.addonNames || []), name || "Extra Service"];
        b.total = Number(b.total || 0) + Number(price || 0);
        b.balance = Number(b.balance || 0) + Number(price || 0);
        b.status = "Extra Services Added";
        updateBooking(id, b);
        api("addExtraService", { id, addonName: name || "Extra Service", price: Number(price || 0) }).catch(() => {});
        toast("Extra service added and balance updated.");
      }
      function setButtonBusy(btn, label) {
        if (!btn || btn.classList.contains("busy") || btn.classList.contains("tab") || btn.classList.contains("filter")) return;
        const old = btn.dataset.oldText || btn.textContent;
        btn.dataset.oldText = old;
        btn.classList.add("busy");
        btn.disabled = true;
        if (label) btn.firstChild ? btn.firstChild.textContent = label : (btn.textContent = label);
        setTimeout(() => {
          btn.disabled = false;
          btn.classList.remove("busy");
          if (btn.dataset.oldText) btn.textContent = btn.dataset.oldText;
          delete btn.dataset.oldText;
        }, 1200);
      }
      document.addEventListener("click", (e) => {
        const actionButton = e.target.closest("button");
        if (actionButton && !actionButton.matches(".tab,.filter")) setButtonBusy(actionButton, "Working");
      }, true);
      document.addEventListener("click", (e) => {
        const tab = e.target.closest("[data-tab]")?.dataset.tab;
        if (tab) {
          show(tab);
          return;
        }
        const fl = e.target.closest("[data-filter]")?.dataset.filter;
        if (fl) {
          filter = fl;
          renderBookings();
          return;
        }
        const op = e.target.closest("[data-open-booking]")?.dataset.openBooking;
        if (op) {
          openBooking(op);
          return;
        }
        const st = e.target.closest("[data-status]")?.dataset.status;
        if (st) {
          const [id, status] = st.split("|");
          setStatus(id, status);
          return;
        }
        const due = e.target.closest("[data-payment-due]")?.dataset.paymentDue;
        if (due) {
          markPaymentDue(due);
          return;
        }
        const comp = e.target.closest("[data-complete]")?.dataset.complete;
        if (comp) {
          complete(comp);
          return;
        }
        const delBooking = e.target.closest("[data-delete-booking]")?.dataset.deleteBooking;
        if (delBooking) {
          deleteBooking(delBooking);
          return;
        }
        if (e.target.id === "closeModal" || e.target.id === "bookingModal") {
          $("#bookingModal").classList.remove("open");
          return;
        }
        if (e.target.id === "openCameraBtn") {
          openCamera();
          return;
        }
        if (e.target.id === "stopCameraBtn") {
          stopCamera();
          toast("Camera turned off.");
          return;
        }
        if (e.target.id === "stopGpsBtn") {
          stopGpsShare("GPS turned off.");
          return;
        }
        if (e.target.id === "manualStartBtn") {
          startByCode($("#manualQr")?.value || "");
          return;
        }
        if (e.target.id === "savePackageBtn") {
          savePackage();
          return;
        }
        if (e.target.id === "newPackageBtn") {
          edit.packageId = "";
          renderPackages();
          return;
        }
        if (e.target.id === "clearPackageBtn") {
          edit.packageId = "";
          renderPackages();
          return;
        }
        const ep = e.target.closest("[data-edit-package]")?.dataset.editPackage;
        if (ep) {
          edit.packageId = ep;
          renderPackages();
          return;
        }
        const dp = e.target.closest("[data-delete-package]")?.dataset
          .deletePackage;
        if (dp) {
          data.packages = data.packages.filter((x) => x.id !== dp);
          persistLocal();
          renderPackages();
          return;
        }
        if (e.target.id === "saveAddonBtn") {
          saveAddon();
          return;
        }
        if (e.target.id === "newAddonBtn") {
          edit.addonId = "";
          renderAddons();
          return;
        }
        if (e.target.id === "clearAddonBtn") {
          edit.addonId = "";
          renderAddons();
          return;
        }
        const ea = e.target.closest("[data-edit-addon]")?.dataset.editAddon;
        if (ea) {
          edit.addonId = ea;
          renderAddons();
          return;
        }
        const da = e.target.closest("[data-delete-addon]")?.dataset.deleteAddon;
        if (da) {
          data.addons = data.addons.filter((x) => x.id !== da);
          persistLocal();
          renderAddons();
          return;
        }
        if (e.target.id === "saveGalleryBtn") {
          saveGallery();
          return;
        }
        if (e.target.id === "clearGalleryBtn") {
          edit.galleryId = "";
          galleryDraft = { mainImage: "", secondImage: "" };
          renderGallery();
          return;
        }
        const eg = e.target.closest("[data-edit-gallery]")?.dataset.editGallery;
        if (eg) {
          edit.galleryId = eg;
          renderGallery();
          return;
        }
        const dg = e.target.closest("[data-delete-gallery]")?.dataset
          .deleteGallery;
        if (dg) {
          data.gallery = data.gallery.filter((x) => x.id !== dg);
          persistLocal();
          renderGallery();
          return;
        }
        const rv = e.target.closest("[data-review]")?.dataset.review;
        if (rv) {
          const [id, status] = rv.split("|");
          const r = data.reviews.find((x) => x.id === id);
          if (r) {
            r.status = status;
            persistLocal();
            api("updateReviewStatus", { id, status }).catch(() => {});
            renderReviews();
          }
          return;
        }
        const fr = e.target.closest("[data-feature-review]")?.dataset
          .featureReview;
        if (fr) {
          const r = data.reviews.find((x) => x.id === fr);
          if (r) {
            r.featured = !r.featured;
            persistLocal();
            renderReviews();
          }
          return;
        }
        if (e.target.id === "addCouponBtn") {
          saveCoupon();
          return;
        }
        const dc = e.target.closest("[data-delete-coupon]")?.dataset
          .deleteCoupon;
        if (dc !== undefined) {
          data.coupons.splice(Number(dc), 1);
          persistLocal();
          renderCoupons();
          return;
        }
        if (e.target.id === "saveAvailabilityBtn") {
          saveAvailability();
          return;
        }
        if (e.target.id === "saveStaffBtn") {
          saveStaff();
          return;
        }
        if (e.target.id === "newStaffBtn") {
          edit.staffId = "";
          renderStaff();
          return;
        }
        if (e.target.id === "clearStaffBtn") {
          edit.staffId = "";
          renderStaff();
          return;
        }
        const es = e.target.closest("[data-edit-staff]")?.dataset.editStaff;
        if (es) {
          edit.staffId = es;
          renderStaff();
          return;
        }
        const ds = e.target.closest("[data-delete-staff]")?.dataset.deleteStaff;
        if (ds) {
          data.staff = data.staff.filter((x) => x.id !== ds);
          persistLocal();
          renderStaff();
          return;
        }
        if (e.target.id === "saveSettingsBtn") {
          saveSettings();
          return;
        }
        const pr = e.target.closest("[data-propose]")?.dataset.propose;
        if (pr) {
          propose(pr);
          return;
        }
        const sex = e.target.closest("[data-scanner-extra]")?.dataset.scannerExtra;
        if (sex) {
          addScannerExtra(sex);
          return;
        }
        const ex = e.target.closest("[data-extra]")?.dataset.extra;
        if (ex) {
          addExtra(ex);
          return;
        }
        if (e.target.id === "refreshBtn") {
          load();
          return;
        }
        if (e.target.id === "saveAllBtn") {
          if (active === "settings") saveSettings();
          else if (active === "availability") saveAvailability();
          else {
            persistLocal();
            toast("Saved locally for demo.");
          }
        }
      });
      document.addEventListener("change", (e) => {
        if (e.target.id === "galMainFile")
          galleryFile("mainImage", e.target.files[0]);
        if (e.target.id === "galSecondFile")
          galleryFile("secondImage", e.target.files[0]);
      });
      async function load(silent = false) {
        try {
          if (!silent) toast("Syncing with Sheet...");
          const res = await api("getAdminData");
          if (res && res.ok) {
            data = { ...data, ...res };
            data.bookings = Array.isArray(res.bookings) ? res.bookings : [];
            hydrate({ liveBookings: true });
            renderTabs();
            renderActive();
            if (!silent) toast("Synced with Sheet.");
            return;
          }
          throw new Error((res && res.error) || "API did not return data");
        } catch (e) {
          hydrate();
          renderTabs();
          renderActive();
          if (!silent) toast("API not synced. Showing local demo data.");
        }
      }
      hydrate();
      renderTabs();
      renderActive();
      setTimeout(() => load(true), 80);
    </script>
