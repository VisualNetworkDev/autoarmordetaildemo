.table-card{border:1px solid var(--line2);border-radius:18px;overflow:hidden}.table-head,.table-row{display:grid;grid-template-columns:1.3fr .8fr .8fr .6fr .7fr;gap:8px;padding:10px 12px;align-items:center}.table-head{background:rgba(9,124,255,.12);color:#dcecff;font-size:12px;font-weight:1000;text-transform:uppercase}.table-row{border-top:1px solid rgba(255,255,255,.08);font-size:14px}.check-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.check{display:flex;align-items:center;gap:9px;border:1px solid var(--line2);border-radius:14px;background:rgba(255,255,255,.04);padding:10px}.check input{width:18px;min-height:18px;accent-color:#0f8cff}.image-preview{height:144px;border-radius:18px;overflow:hidden;border:1px solid var(--line2);background:#05070b}.image-preview img{width:100%;height:100%;object-fit:cover}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.gallery-card{display:grid;gap:10px}.review-card{display:grid;gap:8px}.stars{color:#ffda7a;letter-spacing:2px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:16px;z-index:40}.modal.open{display:flex}.modal-card{width:min(920px,100%);max-height:88dvh;overflow:auto;scrollbar-width:none}.modal-card::-webkit-scrollbar{display:none}.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}.qr-box{background:#fff;border-radius:20px;padding:14px;width:220px;margin:auto}.qr-box img{width:100%}.scanner-grid{display:grid;grid-template-columns:320px 1fr;gap:14px}.scanner-frame{height:320px;border:1px dashed rgba(99,199,255,.48);border-radius:24px;background:radial-gradient(circle at center,rgba(9,124,255,.15),rgba(0,0,0,.3));display:grid;place-items:center;text-align:center;padding:18px}.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.payment-methods{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}

const API_URL='https://script.google.com/macros/s/AKfycbz5MfcLAb7X0xLrqVkMwcLQ0EAawxQz1rlIDqqalNpkjspiuTIgF6WMdXp4ZP-x3MiauA/exec';
const IMG={'polish': 'https://unsplash.com/photos/CsZjHjFN3N8/download?force=true', 'interior': 'https://unsplash.com/photos/U4IaoKF5aj4/download?force=true', 'buffer': 'https://unsplash.com/photos/cw1914zDHUs/download?force=true', 'paint': 'https://unsplash.com/photos/wTW51lUpC6k/download?force=true', 'wash': 'https://unsplash.com/photos/phP5Qa0CauQ/download?force=true', 'wheel': 'https://unsplash.com/photos/8k_T1EwTySs/download?force=true', 'lux': 'https://unsplash.com/photos/F6romjSOMRU/download?force=true', 'cloth': 'https://images.unsplash.com/photo-1732357624591-f2137085659b?auto=format&fit=crop&w=1400&q=80'};
const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
let active='dashboard', filter='All', selectedBooking=null, staffEditingId='', packageEditingId='', addonEditingId='', galleryEditingId='';
const tabs=[['dashboard','Dashboard'],['bookings','Bookings'],['scanner','Scanner'],['packages','Packages'],['addons','Add-ons'],['gallery','Gallery'],['reviews','Reviews'],['coupons','Coupons'],['availability','Availability'],['staff','Staff'],['settings','Settings']];
const vehicles=['Sedan','Small SUV','Large SUV / Truck','Large Truck','Motorcycle','RV','Boat / Trailer'];
let data={bookings:[],packages:[],addons:[],gallery:[],reviews:[],coupons:[],availability:{days:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],startTime:'08:00',endTime:'17:00',serviceAreaMode:'Jacksonville & surrounding areas'},staff:[],settings:{businessName:'Auto Armor Mobile Detailing',phone:'904-601-8480',email:'autoarmor@example.com',instagramHandle:'@autoarmor.de',instagramUrl:'https://www.instagram.com/autoarmor.de',googleReviewUrl:'#',serviceAreaText:'Jacksonville & surrounding areas',travelFeeDefault:15,depositPercent:10,paymentMethods:['Cash','Zelle','Card','Invoice'],balanceDue:'At completion',paymentNote:'Deposit applies to final balance.'},tracking:[],qrLogs:[],payments:[]};

{id:'full',name:'Full Detail',badge:'Most Popular',description:'The most requested inside-and-out detail.',duration:'3–4 hours',visible:true,featured:true,premium:false,features:['Everything in Basic Refresh','Deep interior vacuum','Door jambs cleaned','Interior UV protectant','Premium spray wax','Trim & tire shine'],prices:{'Sedan':179,'Small SUV':199,'Large SUV / Truck':229,'Large Truck':249,'Motorcycle':129,'RV':0,'Boat / Trailer':0}},
{id:'premium',name:'Premium Detail',badge:'Showroom Level Clean',description:'A premium detail built for a luxury finish.',duration:'5–6 hours',visible:true,featured:false,premium:true,features:['Everything in Full Detail','Shampoo seats & carpets','Leather cleaning & conditioning','Clay bar treatment','Light engine bay cleaning'],prices:{'Sedan':249,'Small SUV':279,'Large SUV / Truck':299,'Large Truck':349,'Motorcycle':179,'RV':0,'Boat / Trailer':0}}
];
const seedAddons=[
{id:'pet',name:'Pet Hair Removal',description:'Deep pet hair removal from seats, carpet and cargo areas.',price:25,label:'$25–$75',variable:true,requiresConfirm:true,visible:true,category:'Interior'},
{id:'stain',name:'Stain Removal',description:'Spot treatment for seat and carpet stains.',price:25,label:'$25+',variable:true,requiresConfirm:true,visible:true,category:'Interior'},
{id:'odor',name:'Odor Elimination',description:'Odor treatment.',price:50,label:'$50',variable:false,requiresConfirm:false,visible:true,category:'Interior'},

const seedBookings=[{id:'AA-48392',createdAt:new Date().toISOString(),status:'Request Received',customerName:'Demo Customer',phone:'904-555-0199',email:'customer@example.com',vehicleType:'Large SUV / Truck',vehicleInfo:'2022 Ford Explorer',packageName:'Full Detail',addonNames:['Pet Hair Removal','Odor Elimination'],coupon:'FIRST20',subtotal:304,discount:60,travelFee:15,total:259,depositPaid:26,balance:233,address:'Jacksonville, FL',city:'Jacksonville',locationType:'Home',appointmentDate:'2026-06-18',appointmentTime:'10:00 AM',notes:'Pet hair in cargo area.',photoCount:3,qrData:'AA-48392',timeline:[],proposal:{}}];
const seedGallery=[{id:'g1',title:'Interior Reset',category:'Interior',vehicle:'Large SUV / Truck',service:'Full Detail',time:'3.5 hours',price:'$229+',description:'Deep vacuum, trim detail and clean finish.',visible:true,beforeFileId:IMG.interior,afterFileId:''},{id:'g2',title:'Wheel & Tire Detail',category:'Wheels',vehicle:'Sedan',service:'Basic Refresh',time:'45 minutes',price:'Included',description:'Wheel faces, tires and shine.',visible:true,beforeFileId:IMG.wheel,afterFileId:''},{id:'g3',title:'Paint Polish Finish',category:'Paint',vehicle:'Luxury',service:'Premium Detail',time:'5 hours',price:'$299+',description:'Machine polishing and gloss finish.',visible:true,beforeFileId:IMG.buffer,afterFileId:''}];

const seedCoupons=[{code:'FIRST20',type:'percentage',value:20,minPackage:'',expires:'',limit:0,active:true},{code:'FULL149',type:'fixedPrice',value:149,minPackage:'full',expires:'',limit:0,active:true}];

function api(action, params={}){return new Promise((resolve,reject)=>{const cb='aa_admin_'+Math.random().toString(36).slice(2);const q=new URLSearchParams({action,callback:cb,...params});const s=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('timeout'))},9000);function cleanup(){clearTimeout(timer);delete window[cb];s.remove()}window[cb]=res=>{cleanup();resolve(res)};s.onerror=()=>{cleanup();reject(new Error('network'))};s.src=API_URL+'?'+q.toString();document.body.appendChild(s)})}
function toast(msg){console.log(msg)}
function money(n){return Number(n||0)?'$'+Number(n).toFixed(0):'Quote'}
function hydrateSeeds(){if(!data.packages.length)data.packages=seedPackages;if(!data.addons.length)data.addons=seedAddons;if(!data.bookings.length)data.bookings=seedBookings;if(!data.gallery.length)data.gallery=seedGallery;if(!data.reviews.length)data.reviews=seedReviews;if(!data.coupons.length)data.coupons=seedCoupons;if(!data.staff.length)data.staff=seedStaff}
function renderTabs(){document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab ${active===t[0]?'active':''}" data-tab="${t[0]}">${t[1]}</button>`).join('')}
function show(tab){active=tab;document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(tab+'View').classList.add('active');renderTabs();renderActive()}
function statusBadge(s){let c=s==='Completed'?'green':s==='Canceled'?'red':s==='Schedule Change Proposed'?'gold':'';return `<span class="badge ${c}">${s||'Pending'}</span>`}
function renderDashboard(){const b=data.bookings;const revenue=b.filter(x=>x.status==='Completed').reduce((s,x)=>s+Number(x.total||0),0);const stats=[['Today',b.length],['Pending',b.filter(x=>/Request|Pending|Proposed/.test(x.status||'')).length],['Confirmed',b.filter(x=>/Confirmed|Scheduled/.test(x.status||'')).length],['In Progress',b.filter(x=>/On The Way|Started/.test(x.status||'')).length],['Completed',b.filter(x=>x.status==='Completed').length],['Revenue',money(revenue)]];document.getElementById('dashboardView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Dashboard</span><h2>Today’s control center</h2></div><p>Compact overview for bookings, service status and revenue.</p></div><div class="stats">${stats.map(s=>`<div class="stat"><b>${s[1]}</b><span>${s[0]}</span></div>`).join('')}</div></div><div class="two"><div class="panel"><div class="section-head"><h2>Jobs Today</h2><button class="btn tiny" data-tab="bookings">View All</button></div><div class="list">${b.slice(0,4).map(bookingCard).join('')}</div></div><div class="panel"><div class="section-head"><h2>Fast Actions</h2></div><div class="grid"><button class="btn primary" data-tab="scanner">Open QR Scanner</button><button class="btn ghost" data-tab="gallery">Add Result Photo</button><button class="btn ghost" data-tab="coupons">Create Coupon</button><button class="btn ghost" data-tab="availability">Update Availability</button></div></div></div>`}
function bookingCard(b){return `<article class="booking"><div class="booking-top"><div><h3>${b.customerName||'Customer'} · ${b.vehicleInfo||b.vehicleType||''}</h3><p class="hint">${b.packageName||''} · ${b.address||''}</p></div>${statusBadge(b.status)}</div><div class="booking-meta"><div class="meta"><span>Date</span><b>${b.appointmentDate||'Pending'}</b></div><div class="meta"><span>Time</span><b>${b.appointmentTime||''}</b></div><div class="meta"><span>Total</span><b>${money(b.total)}</b></div><div class="meta"><span>Balance</span><b>${money(b.balance)}</b></div></div><div class="row-actions"><button class="btn tiny primary" data-status="Price Confirmed" data-id="${b.id}">Confirm Price</button><button class="btn tiny" data-status="Technician On The Way" data-id="${b.id}">On The Way</button><button class="btn tiny" data-status="Service Started" data-id="${b.id}">Start</button><button class="btn tiny gold" data-status="Completed" data-id="${b.id}">Complete</button><button class="btn tiny ghost" data-open-booking="${b.id}">Details</button></div></article>`}
function renderBookings(){const statuses=['All','Request Received','Price Confirmed','Appointment Scheduled','Technician On The Way','Service Started','Completed','Canceled','Schedule Change Proposed'];const list=filter==='All'?data.bookings:data.bookings.filter(b=>b.status===filter);document.getElementById('bookingsView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Bookings</span><h2>Service requests</h2></div><p>Confirm prices, update service status, add extras and propose a new appointment time when needed.</p></div><div class="filters">${statuses.map(s=>`<button class="btn tiny ${filter===s?'active':''}" data-filter="${s}">${s}</button>`).join('')}</div><div class="list">${list.map(bookingCard).join('')||'<p class="hint">No bookings in this filter.</p>'}</div></div>`}
function renderScanner(){document.getElementById('scannerView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">QR Scanner</span><h2>Start service by QR</h2></div><p>Use the customer confirmation QR on arrival. Manual confirmation is available for demo/testing.</p></div><div class="scanner-grid"><div class="scanner-frame"><div><div style="font-size:54px">▣</div><h3>Camera Scan Area</h3><p class="hint">Camera scanning can be enabled with BarcodeDetector on supported browsers.</p></div></div><div class="grid"><div class="field"><label>Confirmation Number</label><input id="scanId" placeholder="AA-48392"></div><button class="btn primary" id="manualStart">Validate & Start Service</button><p class="hint">When validated, the booking status changes to Service Started and the arrival scan is logged.</p><div class="table-card"><div class="table-head"><div>Booking</div><div>Result</div><div>Date</div><div>User</div><div></div></div>${(data.qrLogs||[]).slice(0,6).map(q=>`<div class="table-row"><div>${q.bookingId}</div><div>${q.result}</div><div>${q.at||''}</div><div>${q.user||''}</div><div></div></div>`).join('')}</div></div></div></div>`}
function renderPackages(){document.getElementById('packagesView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Packages</span><h2>Pricing control</h2></div><button class="btn primary" id="newPackage">New Package</button></div><div class="table-card"><div class="table-head"><div>Package</div><div>Badge</div><div>Sedan</div><div>Visible</div><div>Actions</div></div>${data.packages.map(p=>`<div class="table-row"><div><b>${p.name}</b><p class="hint">${p.description||''}</p></div><div>${p.badge||''}</div><div>${money((p.prices||{}).Sedan)}</div><div>${p.visible!==false?'Yes':'No'}</div><div><button class="btn tiny" data-edit-package="${p.id}">Edit</button></div></div>`).join('')}</div></div>`}
function renderAddons(){document.getElementById('addonsView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Add-ons</span><h2>Extra services</h2></div><button class="btn primary" id="newAddon">New Add-on</button></div><div class="cards">${data.addons.map(a=>`<article class="panel"><span class="badge">${a.category||'Service'}</span><h3 style="margin-top:10px">${a.name}</h3><p class="hint">${a.description||''}</p><div class="row"><span>Price</span><strong>${a.label||money(a.price)}</strong></div><div class="row"><span>Confirm</span><strong>${a.requiresConfirm?'Yes':'No'}</strong></div><div class="row-actions"><button class="btn tiny" data-edit-addon="${a.id}">Edit</button><button class="btn tiny danger" data-delete-addon="${a.id}">Delete</button></div></article>`).join('')}</div></div>`}
function renderGallery(){document.getElementById('galleryView').innerHTML=`<div class="two"><div class="panel"><div class="section-head"><div><span class="badge">Gallery</span><h2>Result photos</h2></div></div><div class="form-grid"><input type="hidden" id="galId"><div class="field"><label>Title</label><input id="galTitle" placeholder="Interior Reset"></div><div class="field"><label>Category</label><select id="galCategory"><option>Interior</option><option>Exterior</option><option>Wheels</option><option>Seats</option><option>Paint</option><option>Engine Bay</option></select></div><div class="field"><label>Service</label><input id="galService" placeholder="Full Detail"></div><div class="field"><label>Vehicle</label><input id="galVehicle" placeholder="Large SUV / Truck"></div><div class="field full"><label>Main Image URL</label><input id="galBefore" placeholder="Remote image URL or uploaded photo URL"></div><div class="field full"><label>Second Image URL optional</label><input id="galAfter" placeholder="Use only when this is a before/after result"></div><div class="field full"><label>Description</label><textarea id="galDesc"></textarea></div></div><div class="row-actions" style="margin-top:12px"><button class="btn primary" id="saveGalleryItem">Save Result</button><button class="btn ghost" id="clearGalleryItem">Clear</button></div></div><div class="panel"><div class="section-head"><h2>Published Results</h2></div><div class="list">${data.gallery.map(g=>`<article class="mini-row gallery-card"><div class="image-preview"><img src="${g.afterFileId||g.beforeFileId||IMG.interior}" alt="${g.title}"></div><h3>${g.title}</h3><p class="hint">${g.service||''} · ${g.category||''}</p><div class="row-actions"><button class="btn tiny" data-edit-gallery="${g.id}">Edit</button><button class="btn tiny danger" data-delete-gallery="${g.id}">Delete</button></div></article>`).join('')}</div></div></div>`}
function renderReviews(){document.getElementById('reviewsView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Reviews</span><h2>Customer reviews</h2></div></div><div class="cards">${data.reviews.map(r=>`<article class="panel review-card"><div class="stars">${'★'.repeat(Number(r.rating||5))}</div><p>“${r.text}”</p><b>${r.name}</b><span class="small">${r.service||''}</span>${statusBadge(r.status)}<div class="row-actions"><button class="btn tiny primary" data-review="approved" data-id="${r.id}">Approve</button><button class="btn tiny danger" data-review="rejected" data-id="${r.id}">Reject</button><button class="btn tiny ghost" data-feature="${r.id}">${r.featured?'Unfeature':'Feature'}</button></div></article>`).join('')}</div></div>`}
function renderCoupons(){document.getElementById('couponsView').innerHTML=`<div class="two"><div class="panel"><div class="section-head"><div><span class="badge">Coupons</span><h2>Create coupon</h2></div></div><div class="form-grid"><div class="field"><label>Code</label><input id="couponCode" placeholder="FIRST20"></div><div class="field"><label>Type</label><select id="couponType"><option value="percentage">Percentage</option><option value="fixed">Fixed Amount</option><option value="fixedPrice">Fixed Package Price</option></select></div><div class="field"><label>Value</label><input id="couponValue" type="number" placeholder="20"></div><div class="field"><label>Minimum Package</label><input id="couponMin" placeholder="full"></div><div class="field"><label>Expires</label><input id="couponExpires" type="date"></div><div class="field"><label>Usage Limit</label><input id="couponLimit" type="number" value="0"></div></div><button class="btn primary" id="addCoupon" style="margin-top:12px">Save Coupon</button></div><div class="panel"><div class="section-head"><h2>Active Coupons</h2></div><div class="list">${data.coupons.map(c=>`<div class="mini-row"><b>${c.code}</b><p class="hint">${c.type} · ${c.value}${c.type==='percentage'?'%':''}</p><div class="row-actions"><button class="btn tiny danger" data-delete-coupon="${c.code}">Delete</button></div></div>`).join('')}</div></div></div>`}
function renderAvailability(){const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];const av=data.availability||{};document.getElementById('availabilityView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Availability</span><h2>Days and service hours</h2></div><p>General Jacksonville service area stays simple. No reservation limit is used.</p></div><div class="check-grid">${days.map(d=>`<label class="check"><input type="checkbox" class="avDay" value="${d}" ${(av.days||[]).includes(d)?'checked':''}>${d}</label>`).join('')}</div><div class="form-grid" style="margin-top:12px"><div class="field"><label>Start Time</label><input id="avStart" type="time" value="${av.startTime||'08:00'}"></div><div class="field"><label>End Time</label><input id="avEnd" type="time" value="${av.endTime||'17:00'}"></div><div class="field full"><label>Service Area</label><input id="avArea" value="${av.serviceAreaMode||'Jacksonville & surrounding areas'}"></div></div><button class="btn primary" id="saveAvailability" style="margin-top:12px">Save Availability</button></div>`}
function renderStaff(){const perms=['Dashboard','Bookings','Scanner','Packages','Add-ons','Gallery','Reviews','Coupons','Availability','Staff','Settings'];const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];document.getElementById('staffView').innerHTML=`<div class="two"><div class="panel"><div class="section-head"><div><span class="badge">Staff</span><h2>Staff permissions</h2></div></div><input type="hidden" id="staffId"><div class="form-grid"><div class="field"><label>Name</label><input id="staffName"></div><div class="field"><label>Email</label><input id="staffEmail"></div><div class="field"><label>Role</label><input id="staffRole" placeholder="Detailer"></div><div class="field"><label>Active</label><select id="staffActive"><option value="true">Active</option><option value="false">Inactive</option></select></div><div class="field full"><label>Services</label><input id="staffServices" placeholder="Basic Refresh, Full Detail"></div></div><h3 style="margin:14px 0 8px">Working Days</h3><div class="check-grid">${days.map(d=>`<label class="check"><input type="checkbox" class="staffDay" value="${d}">${d}</label>`).join('')}</div><h3 style="margin:14px 0 8px">Permissions</h3><div class="check-grid">${perms.map(p=>`<label class="check"><input type="checkbox" class="staffPerm" value="${p}">${p}</label>`).join('')}</div><div class="row-actions" style="margin-top:12px"><button class="btn primary" id="saveStaffMember">Save Staff</button><button class="btn ghost" id="clearStaffMember">Clear</button></div></div><div class="panel"><div class="section-head"><h2>Team</h2></div><div class="list">${data.staff.map(s=>`<article class="mini-row"><div><b>${s.name}</b><p class="hint">${s.role||''} · ${s.email||''}</p></div><div class="row-actions"><button class="btn tiny" data-edit-staff="${s.id}">Edit</button><button class="btn tiny danger" data-delete-staff="${s.id}">Delete</button></div></article>`).join('')}</div></div></div>`}
function renderSettings(){const s=data.settings||{};const methods=s.paymentMethods||['Cash','Zelle','Card','Invoice'];const all=['Cash','Zelle','Card','Invoice','Apple Pay','Cash App'];document.getElementById('settingsView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Settings</span><h2>Business & payments</h2></div></div><div class="settings-grid"><div class="field"><label>Business Name</label><input id="setBusiness" value="${s.businessName||''}"></div><div class="field"><label>Phone</label><input id="setPhone" value="${s.phone||''}"></div><div class="field"><label>Email</label><input id="setEmail" value="${s.email||''}"></div><div class="field"><label>Instagram Handle</label><input id="setIgHandle" value="${s.instagramHandle||''}"></div><div class="field"><label>Instagram URL</label><input id="setIgUrl" value="${s.instagramUrl||''}"></div><div class="field"><label>Google Review URL</label><input id="setGoogle" value="${s.googleReviewUrl||''}"></div><div class="field full"><label>Service Area Text</label><input id="setArea" value="${s.serviceAreaText||'Jacksonville & surrounding areas'}"></div><div class="field"><label>Travel Fee Default</label><input id="setTravel" type="number" value="${s.travelFeeDefault||15}"></div><div class="field"><label>Deposit Percent</label><input id="setDeposit" type="number" value="${s.depositPercent||10}"></div><div class="field"><label>Balance Due</label><input id="setBalanceDue" value="${s.balanceDue||'At completion'}"></div><div class="field full"><label>Payment Note</label><textarea id="setPaymentNote">${s.paymentNote||'Deposit applies to final balance.'}</textarea></div></div><h3 style="margin:14px 0 8px">Payment Options</h3><div class="payment-methods">${all.map(m=>`<label class="check"><input class="payMethod" type="checkbox" value="${m}" ${methods.includes(m)?'checked':''}>${m}</label>`).join('')}</div><button class="btn primary" id="saveSettings" style="margin-top:14px">Save Settings</button></div>`}
function renderActive(){if(active==='dashboard')renderDashboard();if(active==='bookings')renderBookings();if(active==='scanner')renderScanner();if(active==='packages')renderPackages();if(active==='addons')renderAddons();if(active==='gallery')renderGallery();if(active==='reviews')renderReviews();if(active==='coupons')renderCoupons();if(active==='availability')renderAvailability();if(active==='staff')renderStaff();if(active==='settings')renderSettings()}
function openBooking(id){const b=data.bookings.find(x=>x.id===id);if(!b)return;selectedBooking=b;document.getElementById('bookingModal').innerHTML=`<div class="modal-card"><div class="modal-head"><div><span class="badge">${b.id}</span><h2>${b.customerName||'Customer'}</h2><p class="hint">${b.vehicleInfo||b.vehicleType||''} · ${b.packageName||''}</p></div><button class="btn icon" data-close>×</button></div><div class="two"><div class="panel" style="box-shadow:none"><h3>Booking Details</h3><div class="summary"><div class="row"><span>Status</span><strong>${b.status}</strong></div><div class="row"><span>Total</span><strong>${money(b.total)}</strong></div><div class="row"><span>Deposit</span><strong>${money(b.depositPaid)}</strong></div><div class="row"><span>Balance</span><strong>${money(b.balance)}</strong></div><div class="row"><span>Address</span><strong>${b.address||''}</strong></div><div class="row"><span>Photos</span><strong>${b.photoCount||0}</strong></div></div><div class="row-actions" style="margin-top:12px"><button class="btn tiny primary" data-status="Price Confirmed" data-id="${b.id}">Confirm Price</button><button class="btn tiny" data-status="Technician On The Way" data-id="${b.id}">On The Way</button><button class="btn tiny" data-status="Service Started" data-id="${b.id}">Start</button><button class="btn tiny gold" data-status="Completed" data-id="${b.id}">Complete</button></div></div><div class="panel" style="box-shadow:none"><h3>Propose Different Date / Time</h3><div class="form-grid" style="margin-top:10px"><div class="field"><label>New Date</label><input id="propDate" type="date"></div><div class="field"><label>New Time</label><input id="propTime" placeholder="2:00 PM"></div><div class="field full"><label>Reason</label><textarea id="propReason" placeholder="Schedule adjustment, weather, service time needed..."></textarea></div></div><button class="btn primary" style="margin-top:12px" data-propose="${b.id}">Send New Time</button><p class="hint" style="margin-top:8px">Customer can accept, cancel, or call directly from their tracking page.</p></div></div></div>`;document.getElementById('bookingModal').classList.add('open')}
async function updateStatus(id,status){const b=data.bookings.find(x=>x.id===id);if(b)b.status=status;renderActive();try{await api(status==='Completed'?'completeService':'updateBookingStatus',{id,status})}catch(e){} }
function fillStaff(s){document.getElementById('staffId').value=s.id;document.getElementById('staffName').value=s.name||'';document.getElementById('staffEmail').value=s.email||'';document.getElementById('staffRole').value=s.role||'';document.getElementById('staffActive').value=String(s.active!==false);document.getElementById('staffServices').value=(s.services||[]).join(', ');document.querySelectorAll('.staffDay').forEach(x=>x.checked=(s.days||[]).includes(x.value));document.querySelectorAll('.staffPerm').forEach(x=>x.checked=(s.permissions||[]).includes(x.value))}
function clearStaff(){document.getElementById('staffId').value='';document.getElementById('staffName').value='';document.getElementById('staffEmail').value='';document.getElementById('staffRole').value='';document.getElementById('staffServices').value='';document.querySelectorAll('.staffDay,.staffPerm').forEach(x=>x.checked=false)}
function saveStaff(){const id=document.getElementById('staffId').value||'s'+Date.now();const staff={id,name:document.getElementById('staffName').value,email:document.getElementById('staffEmail').value,role:document.getElementById('staffRole').value,active:document.getElementById('staffActive').value==='true',services:document.getElementById('staffServices').value.split(',').map(x=>x.trim()).filter(Boolean),days:[...document.querySelectorAll('.staffDay:checked')].map(x=>x.value),permissions:[...document.querySelectorAll('.staffPerm:checked')].map(x=>x.value)};const i=data.staff.findIndex(x=>x.id===id);if(i>=0)data.staff[i]=staff;else data.staff.push(staff);api('saveStaff',{staffJson:JSON.stringify(data.staff)}).catch(()=>{});renderStaff()}
function saveGallery(){const id=document.getElementById('galId').value||'g'+Date.now();const g={id,title:document.getElementById('galTitle').value,category:document.getElementById('galCategory').value,vehicle:document.getElementById('galVehicle').value,service:document.getElementById('galService').value,time:'',price:'',description:document.getElementById('galDesc').value,visible:true,beforeFileId:document.getElementById('galBefore').value,afterFileId:document.getElementById('galAfter').value};const i=data.gallery.findIndex(x=>x.id===id);if(i>=0)data.gallery[i]=g;else data.gallery.unshift(g);api('saveGallery',{galleryJson:JSON.stringify(data.gallery)}).catch(()=>{});renderGallery()}
document.addEventListener('click',e=>{const tab=e.target.closest('[data-tab]');if(tab){show(tab.dataset.tab);return}if(e.target.id==='refreshBtn'){load();return}if(e.target.id==='openScannerTop'){show('scanner');return}const f=e.target.closest('[data-filter]');if(f){filter=f.dataset.filter;renderBookings();return}const st=e.target.closest('[data-status]');if(st){updateStatus(st.dataset.id,st.dataset.status);return}const ob=e.target.closest('[data-open-booking]');if(ob){openBooking(ob.dataset.openBooking);return}if(e.target.closest('[data-close]')){document.querySelectorAll('.modal').forEach(m=>m.classList.remove('open'));return}if(e.target.id==='manualStart'){const id=document.getElementById('scanId').value.trim();if(id)updateStatus(id,'Service Started');api('validateQrStartService',{id}).catch(()=>{});return}const prop=e.target.closest('[data-propose]');if(prop){const id=prop.dataset.propose;const b=data.bookings.find(x=>x.id===id);const proposal={date:document.getElementById('propDate').value,time:document.getElementById('propTime').value,reason:document.getElementById('propReason').value,status:'pending'};if(b){b.status='Schedule Change Proposed';b.proposal=proposal}api('proposeSchedule',{id,date:proposal.date,time:proposal.time,reason:proposal.reason}).catch(()=>{});document.getElementById('bookingModal').classList.remove('open');renderActive();return}const rs=e.target.closest('[data-review]');if(rs){const r=data.reviews.find(x=>x.id===rs.dataset.id);if(r)r.status=rs.dataset.review;api('updateReviewStatus',{id:rs.dataset.id,status:rs.dataset.review}).catch(()=>{});renderReviews();return}const rf=e.target.closest('[data-feature]');if(rf){const r=data.reviews.find(x=>x.id===rf.dataset.feature);if(r)r.featured=!r.featured;api('saveReviews',{reviewsJson:JSON.stringify(data.reviews)}).catch(()=>{});renderReviews();return}if(e.target.id==='saveAvailability'){data.availability={days:[...document.querySelectorAll('.avDay:checked')].map(x=>x.value),startTime:document.getElementById('avStart').value,endTime:document.getElementById('avEnd').value,serviceAreaMode:document.getElementById('avArea').value};api('saveAvailability',{availabilityJson:JSON.stringify(data.availability)}).catch(()=>{});renderAvailability();return}if(e.target.id==='saveSettings'){data.settings={...data.settings,businessName:document.getElementById('setBusiness').value,phone:document.getElementById('setPhone').value,email:document.getElementById('setEmail').value,instagramHandle:document.getElementById('setIgHandle').value,instagramUrl:document.getElementById('setIgUrl').value,googleReviewUrl:document.getElementById('setGoogle').value,serviceAreaText:document.getElementById('setArea').value,travelFeeDefault:Number(document.getElementById('setTravel').value||0),depositPercent:Number(document.getElementById('setDeposit').value||0),balanceDue:document.getElementById('setBalanceDue').value,paymentNote:document.getElementById('setPaymentNote').value,paymentMethods:[...document.querySelectorAll('.payMethod:checked')].map(x=>x.value)};api('saveSettings',{settingsJson:JSON.stringify(data.settings)}).catch(()=>{});renderSettings();return}if(e.target.id==='saveStaffMember'){saveStaff();return}if(e.target.id==='clearStaffMember'){clearStaff();return}const es=e.target.closest('[data-edit-staff]');if(es){show('staff');setTimeout(()=>fillStaff(data.staff.find(x=>x.id===es.dataset.editStaff)),0);return}const ds=e.target.closest('[data-delete-staff]');if(ds){data.staff=data.staff.filter(x=>x.id!==ds.dataset.deleteStaff);api('saveStaff',{staffJson:JSON.stringify(data.staff)}).catch(()=>{});renderStaff();return}if(e.target.id==='saveGalleryItem'){saveGallery();return}if(e.target.id==='clearGalleryItem'){renderGallery();return}const eg=e.target.closest('[data-edit-gallery]');if(eg){const g=data.gallery.find(x=>x.id===eg.dataset.editGallery);if(g){document.getElementById('galId').value=g.id;document.getElementById('galTitle').value=g.title||'';document.getElementById('galCategory').value=g.category||'Interior';document.getElementById('galService').value=g.service||'';document.getElementById('galVehicle').value=g.vehicle||'';document.getElementById('galBefore').value=g.beforeFileId||'';document.getElementById('galAfter').value=g.afterFileId||'';document.getElementById('galDesc').value=g.description||''}return}const dg=e.target.closest('[data-delete-gallery]');if(dg){data.gallery=data.gallery.filter(x=>x.id!==dg.dataset.deleteGallery);api('saveGallery',{galleryJson:JSON.stringify(data.gallery)}).catch(()=>{});renderGallery();return}if(e.target.id==='addCoupon'){const c={code:document.getElementById('couponCode').value.toUpperCase(),type:document.getElementById('couponType').value,value:Number(document.getElementById('couponValue').value||0),minPackage:document.getElementById('couponMin').value,expires:document.getElementById('couponExpires').value,limit:Number(document.getElementById('couponLimit').value||0),active:true};if(c.code){data.coupons=data.coupons.filter(x=>x.code!==c.code);data.coupons.push(c);api('saveCoupons',{couponsJson:JSON.stringify(data.coupons)}).catch(()=>{});renderCoupons()}return}const dc=e.target.closest('[data-delete-coupon]');if(dc){data.coupons=data.coupons.filter(x=>x.code!==dc.dataset.deleteCoupon);api('saveCoupons',{couponsJson:JSON.stringify(data.coupons)}).catch(()=>{});renderCoupons();return}const da=e.target.closest('[data-delete-addon]');if(da){data.addons=data.addons.filter(x=>x.id!==da.dataset.deleteAddon);api('saveAddons',{addonsJson:JSON.stringify(data.addons)}).catch(()=>{});renderAddons();return}});
async function load(){hydrateSeeds();renderTabs();renderActive();try{const res=await api('getAdminData');if(res.ok){data={...data,...res};hydrateSeeds();renderActive()}}catch(e){}}
load();
</script>
</body>
