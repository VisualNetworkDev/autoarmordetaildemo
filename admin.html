  <style>
    :root{--void:#03050a;--carbon:#070c14;--carbon2:#0b1320;--panel:rgba(10,18,30,.92);--panel2:rgba(15,25,41,.84);--text:#f5f8ff;--soft:#b3c1d8;--muted:#8190aa;--blue:#1d8bff;--cyan:#72dcff;--purple:#9c7bff;--gold:#e7c56f;--green:#4fe7a2;--red:#ff6379;--line:rgba(114,220,255,.24);--line2:rgba(255,255,255,.105);--shadow:0 22px 70px rgba(0,0,0,.48);--r:28px;--r2:18px}
    *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;overflow:hidden}body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);background:#02050b}body:before{content:"";position:fixed;inset:0;z-index:-4;background:radial-gradient(circle at 18% 0%,rgba(29,139,255,.24),transparent 31%),radial-gradient(circle at 88% 8%,rgba(156,123,255,.16),transparent 34%),linear-gradient(180deg,#050915,#02050b 70%)}body:after{content:"";position:fixed;inset:-80px;z-index:-3;opacity:.92;background-image:linear-gradient(45deg,rgba(255,255,255,.038) 25%,transparent 25%,transparent 75%,rgba(255,255,255,.038) 75%),linear-gradient(45deg,rgba(255,255,255,.028) 25%,transparent 25%,transparent 75%,rgba(255,255,255,.028) 75%),linear-gradient(135deg,rgba(114,220,255,.045),transparent 32%,rgba(255,255,255,.025) 50%,transparent 68%,rgba(156,123,255,.045));background-position:0 0,13px 13px,0 0;background-size:26px 26px,26px 26px,100% 100%}.ambient{position:fixed;inset:0;z-index:-1;pointer-events:none;background:linear-gradient(180deg,rgba(2,5,11,.12),rgba(2,5,11,.82))}button,input,select,textarea{font:inherit;color:inherit}button{border:0;cursor:pointer}a{text-decoration:none;color:inherit}input,select,textarea{width:100%;border:1px solid rgba(114,220,255,.22);background:#0a1423;color:#f8fbff;border-radius:15px;padding:10px 11px;outline:none}select{appearance:none;-webkit-appearance:none;background-color:#0a1423!important;background-image:linear-gradient(45deg,transparent 50%,#72dcff 50%),linear-gradient(135deg,#72dcff 50%,transparent 50%);background-position:calc(100% - 18px) 52%,calc(100% - 12px) 52%;background-size:6px 6px,6px 6px;background-repeat:no-repeat;padding-right:38px}option{background:#0a1423!important;color:#f8fbff!important}textarea{min-height:92px;resize:vertical}.app{height:100dvh;width:min(1500px,100%);margin:0 auto;padding:12px;display:grid;grid-template-columns:250px minmax(0,1fr);gap:12px}.side,.panel,.card{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(145deg,rgba(12,21,36,.92),rgba(5,10,18,.91));box-shadow:var(--shadow)}.side:before,.panel:before,.card:before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(114,220,255,.10),transparent 38%,rgba(156,123,255,.07))}.inside{position:relative;z-index:1}.side{padding:14px;display:flex;flex-direction:column;gap:12px}.brand{display:flex;gap:11px;align-items:center}.mark{width:44px;height:44px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(145deg,#0e1b2d,#07101d);border:1px solid rgba(114,220,255,.38);box-shadow:0 0 0 3px rgba(29,139,255,.08),0 0 28px rgba(29,139,255,.23);font-weight:1000;color:var(--cyan)}.brand b{display:block;text-transform:uppercase;font-style:italic}.brand span{display:block;color:var(--muted);font-size:12px}.navlist{display:grid;gap:7px;overflow:auto;scrollbar-width:none}.navlist::-webkit-scrollbar,.view::-webkit-scrollbar,.drawer::-webkit-scrollbar{display:none;width:0;height:0}.nav{display:flex;align-items:center;gap:9px;padding:11px;border-radius:17px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.075);color:var(--soft);text-align:left;font-size:13px;font-weight:900}.nav.active{background:linear-gradient(135deg,rgba(29,139,255,.28),rgba(114,220,255,.10));border-color:rgba(114,220,255,.27);color:#fff}.main{min-height:0;display:flex;flex-direction:column;gap:12px}.top{flex:0 0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 14px}.top h1{font-size:clamp(27px,4vw,45px);line-height:.9;text-transform:uppercase;font-style:italic;letter-spacing:-.055em}.badge,.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 9px;background:rgba(114,220,255,.10);border:1px solid rgba(114,220,255,.23);font-size:11px;font-weight:1000;text-transform:uppercase;color:#dff7ff}.btn,.ghost,.soft,.danger,.success{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:8px 12px;font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;transition:.18s ease}.btn{background:linear-gradient(135deg,#edfaff,#72dcff 45%,#1d8bff);color:#06101e;box-shadow:0 13px 28px rgba(29,139,255,.25)}.ghost{background:rgba(29,139,255,.10);border:1px solid var(--line);color:#e5f5ff}.soft{background:rgba(255,255,255,.055);border:1px solid var(--line2);color:#dce9fb}.success{background:rgba(79,231,162,.13);border:1px solid rgba(79,231,162,.35);color:#ddffed}.danger{background:rgba(255,99,121,.13);border:1px solid rgba(255,99,121,.34);color:#ffe4e8}.view{display:none;min-height:0;overflow:auto;padding:2px 2px 16px}.view.active{display:block;animation:in .22s ease both}@keyframes in{from{opacity:.35;transform:translateY(12px)}to{opacity:1;transform:none}}.head{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:12px}.head h2{font-size:clamp(28px,4vw,50px);line-height:.92;text-transform:uppercase;font-style:italic;letter-spacing:-.055em}.head p{max-width:620px;color:var(--soft);line-height:1.5}.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{padding:15px}.stat b{font-size:28px;color:#eafaff}.stat span{display:block;color:var(--muted);font-size:11px;font-weight:950;text-transform:uppercase}.table{display:grid;gap:8px}.job{display:grid;grid-template-columns:1.2fr .9fr .8fr .8fr auto;gap:8px;align-items:center;padding:12px;border-radius:18px;border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.045)}.job b{display:block}.small{font-size:12px;color:var(--muted);line-height:1.45}.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}.row span:first-child{color:var(--muted)}.actions{display:flex;gap:7px;flex-wrap:wrap}.field{display:grid;gap:6px}.field label{font-size:11px;text-transform:uppercase;font-weight:950;color:#b9c7dc;letter-spacing:.05em}.edit-card{padding:13px;border-radius:20px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.045)}.price-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.empty{padding:22px;border:1px dashed rgba(114,220,255,.28);border-radius:20px;color:var(--muted);text-align:center}.drawer{position:fixed;right:14px;top:14px;bottom:14px;z-index:60;width:min(560px,calc(100% - 28px));padding:16px;display:none;overflow:auto}.drawer.show{display:block;animation:drawer .2s ease both}@keyframes drawer{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}.qr-camera{height:280px;border-radius:22px;overflow:hidden;background:#050914;border:1px solid rgba(255,255,255,.12);display:grid;place-items:center}.qr-camera video{width:100%;height:100%;object-fit:cover}.timeline{display:grid;gap:8px}.event{padding:10px;border-radius:16px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.08)}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:90;max-width:min(520px,calc(100% - 24px));padding:12px 14px;border-radius:18px;border:1px solid rgba(114,220,255,.28);background:rgba(5,10,19,.94);box-shadow:0 18px 50px rgba(0,0,0,.55);display:none}.toast.show{display:block;animation:in .2s ease both}.mobilebar{display:none}.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.photo-grid img{width:100%;height:95px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.12)}@media(max-width:1080px){.app{grid-template-columns:1fr;padding-bottom:82px}.side{display:none}.mobilebar{display:grid;position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:80;width:min(840px,calc(100% - 18px));grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;border-radius:24px;border:1px solid var(--line);background:rgba(3,7,14,.93);backdrop-filter:blur(16px)}.grid4,.grid3{grid-template-columns:repeat(2,1fr)}.job{grid-template-columns:1fr}.head{display:block}.head p{margin-top:8px}}@media(max-width:620px){.grid4,.grid3,.grid2,.price-grid{grid-template-columns:1fr}.top{display:block}.actions{margin-top:8px}.mobilebar{grid-template-columns:repeat(5,1fr)}.nav{font-size:10px;padding:8px}.drawer{inset:8px;width:auto}.qr-camera{height:220px}}
  </style>
</head>
<body><div class="ambient"></div>
<div class="app">
  <aside class="side"><div class="inside brand"><div class="mark">AA</div><div><b>Auto Armor</b><span>Demo Admin · no password</span></div></div><div class="navlist" id="sideNav"></div><div class="small">This demo admin opens directly. Login, roles, and developer access are added in the production version.</div></aside>
  <main class="main">
    <header class="panel top"><div class="inside"><span class="badge">Demo Admin Panel</span><h1>Auto Armor Control Center</h1></div><div class="inside actions"><button class="ghost" id="setupBtn">Setup Sheet</button><a class="soft" href="index.html" target="_blank">Open Client Page</a><button class="btn" data-view="scanner">Scan QR</button></div></header>
    <section class="view active" id="dashboard"></section><section class="view" id="bookings"></section><section class="view" id="scanner"></section><section class="view" id="packages"></section><section class="view" id="addons"></section><section class="view" id="availability"></section><section class="view" id="gallery"></section><section class="view" id="reviews"></section><section class="view" id="coupons"></section><section class="view" id="staff"></section><section class="view" id="settings"></section><section class="view" id="notifications"></section>
  </main>
</div>

<div class="panel drawer" id="drawer"><div class="inside" id="drawerBody"></div></div><div class="toast" id="toast"></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbz5MfcLAb7X0xLrqVkMwcLQ0EAawxQz1rlIDqqalNpkjspiuTIgF6WMdXp4ZP-x3MiauA/exec';
const STORE='autoArmorDemo.v4';
const vehicles=['Sedan','Small SUV','Large SUV / Truck','Large Truck','Motorcycle','RV','Boat / Trailer'];
const tabs=[['dashboard','Dashboard'],['bookings','Bookings'],['scanner','QR Scanner'],['packages','Packages'],['addons','Add-ons'],['availability','Availability'],['gallery','Gallery'],['reviews','Reviews'],['coupons','Coupons'],['staff','Staff'],['settings','Settings'],['notifications','Notifications']];
const seed={settings:{businessName:'Auto Armor Mobile Detailing',phone:'904-555-0149',email:'autoarmor@example.com',adminEmail:'autoarmor@example.com',instagramHandle:'@autoarmorjax',instagramUrl:'https://www.instagram.com/',googleReviewUrl:'#',serviceAreaText:'Jacksonville & surrounding areas',travelFeeDefault:15,depositPercent:10,gpsEnabled:true,qrEnabled:true,clientPageUrl:'index.html'},packages:[{id:'basic',name:'Basic Refresh',badge:'Routine Maintenance',description:'Perfect for a fast maintenance clean.',duration:'1.5–2 hours',visible:true,features:['Exterior hand wash','Wheels & tire shine','Quick interior vacuum','Dash & surface wipe down','Interior windows'],prices:{'Sedan':99,'Small SUV':119,'Large SUV / Truck':139,'Large Truck':159,'Motorcycle':79,'RV':0,'Boat / Trailer':0}},{id:'full',name:'Full Detail',badge:'Most Popular',description:'The balanced inside-and-out detail.',duration:'3–4 hours',visible:true,featured:true,features:['Everything in Basic','Deep interior vacuum','Door jambs cleaned','Interior UV protectant','Premium spray wax','Trim & tire shine'],prices:{'Sedan':179,'Small SUV':199,'Large SUV / Truck':229,'Large Truck':249,'Motorcycle':129,'RV':0,'Boat / Trailer':0}},{id:'premium',name:'Premium Detail',badge:'Showroom Level Clean',description:'High-impact clean for premium results.',duration:'5–6 hours',visible:true,premium:true,features:['Everything in Full Detail','Shampoo seats & carpets','Leather cleaning & conditioning','Clay bar treatment','Light engine bay cleaning'],prices:{'Sedan':249,'Small SUV':279,'Large SUV / Truck':299,'Large Truck':349,'Motorcycle':179,'RV':0,'Boat / Trailer':0}},{id:'specialty',name:'Specialty Vehicle',badge:'Request Quote',description:'For RVs, boats, trailers, oversized and custom work.',duration:'Manual review',visible:true,features:['RV detailing','Boat / trailer cleaning','Paint correction options','Custom quote after photos'],prices:{'Sedan':0,'Small SUV':0,'Large SUV / Truck':0,'Large Truck':0,'Motorcycle':0,'RV':0,'Boat / Trailer':0}}],addons:[{id:'pet',name:'Pet Hair Removal',description:'Deep pet hair removal from seats, carpet and cargo areas.',price:25,label:'$25–$75',variable:true,requiresConfirm:true,visible:true,category:'Interior'},{id:'stain',name:'Stain Removal',description:'Spot treatment for seat and carpet stains.',price:25,label:'$25+',variable:true,requiresConfirm:true,visible:true,category:'Interior'},{id:'odor',name:'Odor Elimination',description:'Odor treatment for smoke, food, pets or moisture smells.',price:50,label:'$50',visible:true,category:'Interior'},{id:'headlight',name:'Headlight Restoration',description:'Restore faded headlights for cleaner visibility.',price:75,label:'$75',visible:true,category:'Exterior'},{id:'engine',name:'Engine Bay Detail',description:'Light engine bay cleaning and dressing.',price:50,label:'$50',visible:true,category:'Exterior'},{id:'wax',name:'Wax Protection',description:'Added paint protection and gloss.',price:100,label:'Starting at $100',variable:true,visible:true,category:'Protection'},{id:'ceramic',name:'Ceramic Coating',description:'Premium protection package.',price:250,label:'Starting at $250',variable:true,requiresConfirm:true,visible:true,category:'Protection'},{id:'paint',name:'Paint Correction',description:'Machine correction for gloss and defect reduction.',price:300,label:'Starting at $300',variable:true,requiresConfirm:true,visible:true,category:'Correction'}],gallery:[{id:'g1',title:'Interior Reset',category:'Interior',vehicle:'Large SUV / Truck',service:'Full Detail',time:'3.5 hours',price:'$229+',description:'Deep vacuum, trim protection, windows and a clean finish.',visible:true},{id:'g2',title:'Seat & Carpet Recovery',category:'Seats',vehicle:'Sedan',service:'Premium Detail',time:'5 hours',price:'$249+',description:'Shampoo seats and carpets with a premium interior finish.',visible:true}],reviews:[{id:'r1',name:'Marcus T.',rating:5,service:'Full Detail',text:'The SUV looked brand new inside. Booking was easy and they came right to my driveway.',status:'approved',featured:true},{id:'r2',name:'Ashley R.',rating:5,service:'Premium Detail',text:'The before and after was crazy. Seats, carpets and wheels came out much better than expected.',status:'approved',featured:true}],coupons:[{code:'FIRST20',type:'percent',value:20,minPackage:'',expires:'2027-12-31',limit:100,active:true},{code:'VIP10',type:'percent',value:10,minPackage:'premium',expires:'2027-12-31',limit:50,active:true},{code:'ARMOR25',type:'fixed',value:25,minPackage:'full',expires:'2027-12-31',limit:25,active:true}],availability:{days:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],hours:['8:00 AM','10:00 AM','12:00 PM','2:00 PM','4:00 PM'],maxJobsPerDay:3,blockedDates:[],blockedRanges:[],durations:{basic:'1.5–2 hours',full:'3–4 hours',premium:'5–6 hours'},serviceAreaMode:'Jacksonville general area'},staff:[{id:'s1',name:'Lead Technician',email:'tech@example.com',role:'Detailer',services:['Basic Refresh','Full Detail','Premium Detail'],days:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],active:true}],bookings:[],tracking:[],qrLogs:[],payments:[],serviceLogs:[]};
let data=load();let active='dashboard';let filter='all';let editingBooking=null;let scannerStream=null;
function load(){const saved=localStorage.getItem(STORE);if(saved){try{return merge(seed,JSON.parse(saved))}catch(e){}}localStorage.setItem(STORE,JSON.stringify(seed));return structuredClone(seed)}function save(){localStorage.setItem(STORE,JSON.stringify(data))}function merge(a,b){const o=structuredClone(a);Object.keys(b||{}).forEach(k=>{if(Array.isArray(b[k]))o[k]=b[k];else if(b[k]&&typeof b[k]==='object')o[k]=Object.assign(o[k]||{},b[k]);else o[k]=b[k]});return o}function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}function money(n){return '$'+(Number(n)||0).toFixed(2)}function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}function jsonp(action,params={}){return new Promise((res,rej)=>{if(!API_URL)return rej(new Error('No API'));const cb='aa_admin_'+Date.now()+'_'+Math.random().toString(36).slice(2);const s=document.createElement('script');window[cb]=(r)=>{delete window[cb];s.remove();res(r)};s.onerror=()=>{delete window[cb];s.remove();rej(new Error('API unavailable'))};const q=new URLSearchParams({action,callback:cb,...params});s.src=API_URL+'?'+q.toString();document.body.appendChild(s)})}function sync(action,params){jsonp(action,params).catch(()=>{})}
function makeNav(){const html=tabs.map(([id,label])=>`<button class="nav ${id===active?'active':''}" data-view="${id}">${label}</button>`).join('');document.getElementById('sideNav').innerHTML=html;document.getElementById('mobileNav').innerHTML=tabs.slice(0,5).map(([id,label])=>`<button class="nav ${id===active?'active':''}" data-view="${id}">${label.split(' ')[0]}</button>`).join('');document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>show(b.dataset.view))}function show(id){active=id;document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));makeNav();render();if(id!=='scanner')stopScanner()}
function stats(){const today=new Date().toISOString().slice(0,10);const todayJobs=data.bookings.filter(b=>b.appointmentDate===today).length;const pending=data.bookings.filter(b=>['Pending Quote','Request Received'].includes(b.status)).length;const confirmed=data.bookings.filter(b=>['Confirmed','On The Way','Service Started'].includes(b.status)).length;const revenue=data.bookings.filter(b=>b.status==='Completed').reduce((s,b)=>s+Number(b.total||0),0);const deposits=data.bookings.reduce((s,b)=>s+Number(b.depositPaid||0),0);const completed=data.bookings.filter(b=>b.status==='Completed').length;const canceled=data.bookings.filter(b=>b.status==='Canceled').length;const pendingReviews=data.reviews.filter(r=>r.status==='pending').length;return {todayJobs,pending,confirmed,revenue,deposits,completed,canceled,pendingReviews}}
function renderDashboard(){const s=stats();document.getElementById('dashboard').innerHTML=`<div class="head"><div><span class="badge">Overview</span><h2>Today’s Operation</h2></div><p>Track bookings, pending quotes, revenue, QR check-ins, GPS status, reviews and final receipts from one aggressive admin panel.</p></div><div class="grid4">${[['Today’s Appointments',s.todayJobs],['Pending Quotes',s.pending],['Confirmed Jobs',s.confirmed],['Revenue',money(s.revenue)],['Deposits Collected',money(s.deposits)],['Completed Services',s.completed],['Canceled Jobs',s.canceled],['Pending Reviews',s.pendingReviews]].map(x=>`<div class="card stat"><div class="inside"><b>${x[1]}</b><span>${x[0]}</span></div></div>`).join('')}</div><div class="panel card" style="margin-top:12px"><div class="inside"><div class="head"><h2>Jobs Today</h2><button class="btn" data-view="scanner">Scan Customer QR</button></div><div class="table">${jobRows(data.bookings.slice(0,8))}</div></div></div>`;makeNav()}
function jobRows(list){return list.length?list.map(b=>`<div class="job"><div><b>${esc(b.customerName||'Customer')}</b><span class="small">${esc(b.vehicleInfo||b.vehicleType)} · ${esc(b.address||'')}</span></div><div><b>${esc(b.packageName)}</b><span class="small">${esc((b.addonNames||[]).join(', ')||'No extras')}</span></div><div><span class="pill">${esc(b.status)}</span></div><div><b>${money(b.total)}</b><span class="small">Balance ${money(b.balance)}</span></div><div class="actions"><button class="ghost" onclick="openBooking('${esc(b.id)}')">Open</button><button class="soft" onclick="setStatus('${esc(b.id)}','Confirmed')">Confirm</button><button class="soft" onclick="markOnWay('${esc(b.id)}')">On The Way</button><button class="success" onclick="completeBooking('${esc(b.id)}')">Complete</button></div></div>`).join(''):'<div class="empty">No bookings yet. Create one from the client page or use demo data.</div>'}
function renderBookings(){const statuses=['all','Pending Quote','Request Received','Confirmed','On The Way','Service Started','Completed','Canceled'];const list=filter==='all'?data.bookings:data.bookings.filter(b=>b.status===filter);document.getElementById('bookings').innerHTML=`<div class="head"><div><span class="badge">Bookings</span><h2>Reservation Control</h2></div><p>Open each booking to view customer data, photos, selected services, add-ons, travel fee, coupon, deposit, balance, internal notes and timeline.</p></div><div class="actions" style="margin-bottom:12px">${statuses.map(st=>`<button class="${filter===st?'btn':'soft'}" onclick="filter='${esc(st)}';renderBookings()">${esc(st)}</button>`).join('')}</div><div class="table">${jobRows(list)}</div>`}
function openBooking(id){const b=data.bookings.find(x=>x.id===id);if(!b)return;editingBooking=id;document.getElementById('drawerBody').innerHTML=`<div class="actions" style="justify-content:space-between"><span class="badge">${esc(b.status)}</span><button class="danger" onclick="closeDrawer()">Close</button></div><h2 style="margin:12px 0;text-transform:uppercase;font-style:italic">${esc(b.customerName||'Customer')}</h2><div class="grid2"><div class="card"><div class="inside"><h3>Customer</h3><div class="row"><span>Phone</span><b>${esc(b.phone)}</b></div><div class="row"><span>Email</span><b>${esc(b.email)}</b></div><div class="row"><span>Address</span><b>${esc(b.address)}</b></div><div class="row"><span>Location</span><b>${esc(b.locationType)}</b></div></div></div><div class="card"><div class="inside"><h3>Service</h3><div class="row"><span>Vehicle</span><b>${esc(b.vehicleInfo||b.vehicleType)}</b></div><div class="row"><span>Package</span><b>${esc(b.packageName)}</b></div><div class="row"><span>Date</span><b>${esc(b.appointmentDate)} ${esc(b.appointmentTime)}</b></div><div class="row"><span>QR</span><b>${esc(b.qrData||b.id)}</b></div></div></div></div><div class="card" style="margin-top:10px"><div class="inside"><h3>Invoice</h3><div class="row"><span>Add-ons</span><b>${esc((b.addonNames||[]).join(', ')||'None')}</b></div><div class="row"><span>Travel Fee</span><b>${money(b.travelFee)}</b></div><div class="row"><span>Discount / Coupon</span><b>${money(b.discount)} ${b.coupon?'· '+esc(b.coupon):''}</b></div><div class="row"><span>Total</span><b>${money(b.total)}</b></div><div class="row"><span>Deposit</span><b>${money(b.depositPaid)}</b></div><div class="row"><span>Balance</span><b>${money(b.balance)}</b></div></div></div>${(b.photos||[]).length?`<div class="card" style="margin-top:10px"><div class="inside"><h3>Uploaded Photos</h3><div class="photo-grid">${b.photos.map(p=>`<img src="${p}">`).join('')}</div></div></div>`:''}<div class="card" style="margin-top:10px"><div class="inside"><h3>Add Extra Service On Site</h3><div class="grid2"><select id="extraSelect">${data.addons.map(a=>`<option value="${esc(a.id)}">${esc(a.name)} · ${esc(a.label)}</option>`).join('')}</select><input id="extraPrice" type="number" placeholder="Override price"></div><button class="btn" style="margin-top:10px" onclick="addExtraToBooking()">Add Extra Service</button></div></div><div class="actions" style="margin-top:10px"><button class="soft" onclick="setStatus('${esc(b.id)}','Confirmed')">Confirm Price</button><button class="soft" onclick="markOnWay('${esc(b.id)}')">Mark On The Way</button><button class="soft" onclick="setStatus('${esc(b.id)}','Service Started')">Start Service</button><button class="success" onclick="completeBooking('${esc(b.id)}')">Complete & Send Receipt</button><button class="danger" onclick="setStatus('${esc(b.id)}','Canceled')">Cancel</button></div><div class="card" style="margin-top:10px"><div class="inside"><h3>Timeline</h3><div class="timeline">${(b.timeline||[]).map(e=>`<div class="event"><b>${esc(e.status)}</b><div class="small">${new Date(e.at).toLocaleString()} · ${esc(e.note||'')}</div></div>`).join('')}</div></div></div>`;document.getElementById('drawer').classList.add('show')}
function closeDrawer(){document.getElementById('drawer').classList.remove('show');editingBooking=null}window.closeDrawer=closeDrawer;window.openBooking=openBooking;
function addTimeline(b,status,note){b.timeline=b.timeline||[];b.timeline.push({status,at:new Date().toISOString(),note:note||status})}
function setStatus(id,status){const b=data.bookings.find(x=>x.id===id);if(!b)return;b.status=status;addTimeline(b,status,'Status updated from admin.');save();sync('updateBookingStatus',{id,status});toast('Status updated.');render();if(editingBooking===id)openBooking(id)}window.setStatus=setStatus;
function markOnWay(id){const b=data.bookings.find(x=>x.id===id);if(!b)return;const update=(coords)=>{b.status='On The Way';addTimeline(b,'On The Way','Technician is on the way.');if(coords){data.tracking.push({bookingId:id,lat:coords.latitude,lng:coords.longitude,accuracy:coords.accuracy,at:new Date().toISOString()});sync('saveTracking',{id,lat:coords.latitude,lng:coords.longitude,accuracy:coords.accuracy})}save();sync('updateBookingStatus',{id,status:'On The Way'});toast('Marked On The Way.');render();if(editingBooking===id)openBooking(id)};if(navigator.geolocation&&data.settings.gpsEnabled!==false){navigator.geolocation.getCurrentPosition(pos=>update(pos.coords),()=>update(null),{enableHighAccuracy:true,timeout:8000})}else update(null)}window.markOnWay=markOnWay;
function completeBooking(id){const b=data.bookings.find(x=>x.id===id);if(!b)return;b.status='Completed';b.balance=0;addTimeline(b,'Completed','Service completed and final receipt prepared.');data.payments.push({id:'P-'+Date.now(),bookingId:id,amount:Number(b.total||0),method:'Final receipt',at:new Date().toISOString()});save();sync('completeService',{id});toast('Completed. Final receipt updated.');render();if(editingBooking===id)openBooking(id)}window.completeBooking=completeBooking;
function addExtraToBooking(){const b=data.bookings.find(x=>x.id===editingBooking);if(!b)return;const id=document.getElementById('extraSelect').value;const a=data.addons.find(x=>x.id===id);const override=Number(document.getElementById('extraPrice').value||0);const price=override||Number(a.price||0);b.addons=b.addons||[];b.addonNames=b.addonNames||[];b.addons.push(id);b.addonNames.push(a.name);b.total=Number(b.total||0)+price;b.balance=Number(b.balance||0)+price;addTimeline(b,'Extra Services Added',`${a.name} added on site for ${money(price)}.`);save();sync('addExtraService',{id:b.id,addonName:a.name,price});toast('Extra service added.');render();openBooking(b.id)}window.addExtraToBooking=addExtraToBooking;
function renderScanner(){document.getElementById('scanner').innerHTML=`<div class="head"><div><span class="badge">QR Check-In</span><h2>Scan Customer QR</h2></div><p>Customer receives a QR after confirmation. On arrival, scan it from the admin to validate the booking and mark the service as started.</p></div><div class="grid2"><div class="panel card"><div class="inside"><div class="qr-camera" id="qrCamera"><span class="small">Camera scanner ready.</span></div><div class="actions" style="margin-top:12px"><button class="btn" onclick="startScanner()">Start Camera</button><button class="soft" onclick="stopScanner()">Stop</button></div><div class="field" style="margin-top:12px"><label>Manual QR / Confirmation Code</label><div style="display:flex;gap:8px"><input id="manualQr" placeholder="AA-12345"><button class="ghost" onclick="scanManual()">Start Service</button></div></div></div></div><div class="panel card"><div class="inside"><h2>QR Logs</h2><div class="timeline">${(data.qrLogs||[]).slice(0,10).map(l=>`<div class="event"><b>${esc(l.bookingId)}</b><div class="small">${new Date(l.at).toLocaleString()} · ${esc(l.result)}</div></div>`).join('')||'<div class="empty">No scans yet.</div>'}</div></div></div></div>`}
async function startScanner(){const box=document.getElementById('qrCamera');try{scannerStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});box.innerHTML='<video autoplay playsinline></video>';const video=box.querySelector('video');video.srcObject=scannerStream;if('BarcodeDetector' in window){const detector=new BarcodeDetector({formats:['qr_code']});const loop=async()=>{if(!scannerStream)return;try{const codes=await detector.detect(video);if(codes.length){handleQr(codes[0].rawValue);stopScanner();return}}catch(e){}requestAnimationFrame(loop)};loop()}else{toast('Camera opened. Use manual code fallback if QR detection is not supported.')}}catch(e){toast('Camera permission unavailable. Use manual code.')}}window.startScanner=startScanner;function stopScanner(){if(scannerStream){scannerStream.getTracks().forEach(t=>t.stop());scannerStream=null}const box=document.getElementById('qrCamera');if(box)box.innerHTML='<span class="small">Camera scanner stopped.</span>'}window.stopScanner=stopScanner;function scanManual(){handleQr(document.getElementById('manualQr').value)}window.scanManual=scanManual;function handleQr(raw){const id=String(raw||'').match(/AA-\d+/)?.[0]||String(raw||'').trim();const b=data.bookings.find(x=>x.id===id);if(!b){data.qrLogs.unshift({bookingId:id||'Unknown',result:'Not found',at:new Date().toISOString()});save();toast('Booking not found.');renderScanner();return}b.status='Service Started';addTimeline(b,'Service Started','QR scanned on arrival. Service started.');data.qrLogs.unshift({bookingId:b.id,result:'Service started',at:new Date().toISOString()});save();sync('validateQrStartService',{id:b.id});toast('Service started from QR.');render();openBooking(b.id)}
function renderPackages(){document.getElementById('packages').innerHTML=`<div class="head"><div><span class="badge">Pricing</span><h2>Package Control</h2></div><p>Edit package description, included services, pricing per vehicle, visibility and badges without touching code.</p></div><div class="grid2">${data.packages.map((p,i)=>`<div class="edit-card"><div class="field"><label>Name</label><input data-pkg="name" data-i="${i}" value="${esc(p.name)}"></div><div class="field"><label>Badge</label><input data-pkg="badge" data-i="${i}" value="${esc(p.badge)}"></div><div class="field"><label>Description</label><textarea data-pkg="description" data-i="${i}">${esc(p.description)}</textarea></div><div class="field"><label>Included Services</label><textarea data-pkg="features" data-i="${i}">${esc((p.features||[]).join('\n'))}</textarea></div><div class="price-grid">${vehicles.map(v=>`<div class="field"><label>${esc(v)}</label><input type="number" data-price="${esc(v)}" data-i="${i}" value="${Number(p.prices[v]||0)}"></div>`).join('')}</div><label class="small"><input type="checkbox" data-pkg="visible" data-i="${i}" ${p.visible!==false?'checked':''}> Visible ON/OFF</label></div>`).join('')}</div><button class="btn" style="margin-top:12px" onclick="savePackageEditor()">Save Packages</button>`;document.querySelectorAll('#packages input,#packages textarea').forEach(el=>el.onchange=savePackageEditorSilent)}function savePackageEditorSilent(){document.querySelectorAll('[data-pkg]').forEach(el=>{const p=data.packages[Number(el.dataset.i)];const k=el.dataset.pkg;p[k]=k==='visible'?el.checked:k==='features'?el.value.split('\n').map(x=>x.trim()).filter(Boolean):el.value});document.querySelectorAll('[data-price]').forEach(el=>{const p=data.packages[Number(el.dataset.i)];p.prices[el.dataset.price]=Number(el.value)||0});save()}function savePackageEditor(){savePackageEditorSilent();sync('savePackages',{packagesJson:JSON.stringify(data.packages)});toast('Packages saved.');render()}window.savePackageEditor=savePackageEditor;
function renderAddons(){document.getElementById('addons').innerHTML=`<div class="head"><div><span class="badge">Extras</span><h2>Add-on Control</h2></div><p>Create fixed or variable extra services that can be selected by the customer or added by the technician on site.</p></div><button class="btn" onclick="addAddon()" style="margin-bottom:12px">Add Add-on</button><div class="grid3">${data.addons.map((a,i)=>`<div class="edit-card"><div class="field"><label>Name</label><input data-addon="name" data-i="${i}" value="${esc(a.name)}"></div><div class="field"><label>Description</label><textarea data-addon="description" data-i="${i}">${esc(a.description)}</textarea></div><div class="grid2"><div class="field"><label>Price</label><input type="number" data-addon="price" data-i="${i}" value="${Number(a.price||0)}"></div><div class="field"><label>Display Label</label><input data-addon="label" data-i="${i}" value="${esc(a.label)}"></div></div><label class="small"><input type="checkbox" data-addon="variable" data-i="${i}" ${a.variable?'checked':''}> Variable price</label><label class="small"><input type="checkbox" data-addon="requiresConfirm" data-i="${i}" ${a.requiresConfirm?'checked':''}> Requires confirmation</label><label class="small"><input type="checkbox" data-addon="visible" data-i="${i}" ${a.visible!==false?'checked':''}> Visible</label><button class="danger" onclick="deleteAddon(${i})">Delete</button></div>`).join('')}</div>`;document.querySelectorAll('[data-addon]').forEach(el=>el.onchange=saveAddonSilent)}function saveAddonSilent(){document.querySelectorAll('[data-addon]').forEach(el=>{const a=data.addons[Number(el.dataset.i)];const k=el.dataset.addon;a[k]=['visible','variable','requiresConfirm'].includes(k)?el.checked:k==='price'?Number(el.value)||0:el.value});save();sync('saveAddons',{addonsJson:JSON.stringify(data.addons)})}function addAddon(){data.addons.unshift({id:'addon'+Date.now(),name:'New Add-on',description:'Description',price:25,label:'$25',visible:true,variable:false,requiresConfirm:false,category:'Custom'});save();renderAddons()}function deleteAddon(i){data.addons.splice(i,1);save();renderAddons()}window.addAddon=addAddon;window.deleteAddon=deleteAddon;
function renderAvailability(){const a=data.availability;document.getElementById('availability').innerHTML=`<div class="head"><div><span class="badge">Schedule</span><h2>Availability & Travel Fee</h2></div><p>Configure service days, hours, maximum jobs per day, package duration, blocked dates and the Jacksonville-area travel fee logic.</p></div><div class="grid2"><div class="card"><div class="inside"><h3>General Availability</h3><div class="field"><label>Available Days</label><input id="avDays" value="${esc((a.days||[]).join(', '))}"></div><div class="field"><label>Available Hours</label><input id="avHours" value="${esc((a.hours||[]).join(', '))}"></div><div class="field"><label>Max Jobs Per Day</label><input id="maxJobs" type="number" value="${Number(a.maxJobsPerDay||3)}"></div><div class="field"><label>Blocked Dates</label><textarea id="blockedDates" placeholder="2026-06-15, 2026-06-16">${esc((a.blockedDates||[]).join(', '))}</textarea></div></div></div><div class="card"><div class="inside"><h3>Mobile Service Area</h3><div class="field"><label>Service Area Mode</label><input id="serviceAreaMode" value="${esc(a.serviceAreaMode||'Jacksonville general area')}"></div><div class="field"><label>Travel Fee Default</label><input id="travelFeeDefault" type="number" value="${Number(data.settings.travelFeeDefault||0)}"></div><div class="field"><label>Package Durations</label><textarea id="durations">Basic: ${esc(a.durations.basic)}\nFull: ${esc(a.durations.full)}\nPremium: ${esc(a.durations.premium)}</textarea></div><button class="btn" onclick="saveAvailability()">Save Availability</button></div></div></div>`}function saveAvailability(){data.availability.days=document.getElementById('avDays').value.split(',').map(x=>x.trim()).filter(Boolean);data.availability.hours=document.getElementById('avHours').value.split(',').map(x=>x.trim()).filter(Boolean);data.availability.maxJobsPerDay=Number(document.getElementById('maxJobs').value)||3;data.availability.blockedDates=document.getElementById('blockedDates').value.split(',').map(x=>x.trim()).filter(Boolean);data.availability.serviceAreaMode=document.getElementById('serviceAreaMode').value;data.settings.travelFeeDefault=Number(document.getElementById('travelFeeDefault').value)||0;save();sync('saveAvailability',{availabilityJson:JSON.stringify(data.availability),settingsJson:JSON.stringify(data.settings)});toast('Availability saved.')}window.saveAvailability=saveAvailability;
function renderGallery(){document.getElementById('gallery').innerHTML=`<div class="head"><div><span class="badge">Before / After</span><h2>Gallery Admin</h2></div><p>Upload and control before/after pairs. Images are compressed in the browser for demo storage.</p></div><button class="btn" onclick="addGallery()" style="margin-bottom:12px">Create Before/After Pair</button><div class="grid3">${data.gallery.map((g,i)=>`<div class="edit-card"><div class="field"><label>Title</label><input data-gallery="title" data-i="${i}" value="${esc(g.title)}"></div><div class="grid2"><div class="field"><label>Category</label><input data-gallery="category" data-i="${i}" value="${esc(g.category)}"></div><div class="field"><label>Vehicle</label><input data-gallery="vehicle" data-i="${i}" value="${esc(g.vehicle)}"></div></div><div class="field"><label>Description</label><textarea data-gallery="description" data-i="${i}">${esc(g.description)}</textarea></div><label class="small"><input data-gallery="visible" data-i="${i}" type="checkbox" ${g.visible!==false?'checked':''}> Show on client page</label><button class="danger" onclick="deleteGallery(${i})">Delete</button></div>`).join('')}</div>`;document.querySelectorAll('[data-gallery]').forEach(el=>el.onchange=saveGallerySilent)}function addGallery(){data.gallery.unshift({id:'g'+Date.now(),title:'New Detail Result',category:'Interior',vehicle:'Sedan',service:'Full Detail',time:'3 hours',price:'$179+',description:'Before and after result description.',visible:true});save();renderGallery()}function deleteGallery(i){data.gallery.splice(i,1);save();renderGallery()}function saveGallerySilent(){document.querySelectorAll('[data-gallery]').forEach(el=>{const g=data.gallery[Number(el.dataset.i)];const k=el.dataset.gallery;g[k]=k==='visible'?el.checked:el.value});save();sync('saveGallery',{galleryJson:JSON.stringify(data.gallery)})}window.addGallery=addGallery;window.deleteGallery=deleteGallery;
function renderReviews(){const list=data.reviews;document.getElementById('reviews').innerHTML=`<div class="head"><div><span class="badge">Reviews</span><h2>Review Moderation</h2></div><p>Customers see normal review cards on the client page. The admin approves, rejects or features reviews before they appear publicly.</p></div><div class="grid3">${list.map(r=>`<div class="edit-card"><span class="pill">${esc(r.status)}</span><h3 style="margin:8px 0">${esc(r.name)} · ${'★'.repeat(Number(r.rating)||5)}</h3><p class="small">${esc(r.text)}</p><div class="actions" style="margin-top:10px"><button class="success" onclick="reviewStatus('${esc(r.id)}','approved')">Approve</button><button class="danger" onclick="reviewStatus('${esc(r.id)}','rejected')">Reject</button><button class="ghost" onclick="featureReview('${esc(r.id)}')">Feature</button></div></div>`).join('')||'<div class="empty">No reviews yet.</div>'}</div>`}function reviewStatus(id,status){const r=data.reviews.find(x=>x.id===id);if(r){r.status=status;save();sync('updateReviewStatus',{id,status});renderReviews();toast('Review updated.')}}function featureReview(id){const r=data.reviews.find(x=>x.id===id);if(r){r.featured=!r.featured;r.status='approved';save();sync('updateReviewStatus',{id,status:'approved',featured:r.featured});renderReviews();toast('Review featured.')}}window.reviewStatus=reviewStatus;window.featureReview=featureReview;
function renderCoupons(){document.getElementById('coupons').innerHTML=`<div class="head"><div><span class="badge">Promos</span><h2>Coupon Codes</h2></div><p>Create percentage or fixed coupons with dates, limits and active status.</p></div><button class="btn" onclick="addCoupon()" style="margin-bottom:12px">Add Coupon</button><div class="grid3">${data.coupons.map((c,i)=>`<div class="edit-card"><div class="field"><label>Code</label><input data-coupon="code" data-i="${i}" value="${esc(c.code)}"></div><div class="grid2"><div class="field"><label>Type</label><select data-coupon="type" data-i="${i}"><option ${c.type==='percent'?'selected':''}>percent</option><option ${c.type==='fixed'?'selected':''}>fixed</option></select></div><div class="field"><label>Value</label><input type="number" data-coupon="value" data-i="${i}" value="${Number(c.value||0)}"></div></div><div class="field"><label>Expiration</label><input data-coupon="expires" data-i="${i}" value="${esc(c.expires)}"></div><label class="small"><input data-coupon="active" data-i="${i}" type="checkbox" ${c.active!==false?'checked':''}> Active</label><button class="danger" onclick="deleteCoupon(${i})">Delete</button></div>`).join('')}</div>`;document.querySelectorAll('[data-coupon]').forEach(el=>el.onchange=saveCouponSilent)}function addCoupon(){data.coupons.unshift({code:'NEWCODE',type:'fixed',value:25,expires:'2027-12-31',limit:100,active:true});save();renderCoupons()}function deleteCoupon(i){data.coupons.splice(i,1);save();renderCoupons()}function saveCouponSilent(){document.querySelectorAll('[data-coupon]').forEach(el=>{const c=data.coupons[Number(el.dataset.i)];const k=el.dataset.coupon;c[k]=k==='active'?el.checked:k==='value'?Number(el.value)||0:el.value});save();sync('saveCoupons',{couponsJson:JSON.stringify(data.coupons)})}window.addCoupon=addCoupon;window.deleteCoupon=deleteCoupon;
function renderStaff(){document.getElementById('staff').innerHTML=`<div class="head"><div><span class="badge">Staff</span><h2>Technician Logic</h2></div><p>Ready for future multi-user staff permissions, service assignment, availability and email notifications.</p></div><button class="btn" onclick="addStaff()" style="margin-bottom:12px">Add Technician</button><div class="grid3">${data.staff.map((s,i)=>`<div class="edit-card"><div class="field"><label>Name</label><input data-staff="name" data-i="${i}" value="${esc(s.name)}"></div><div class="field"><label>Email</label><input data-staff="email" data-i="${i}" value="${esc(s.email)}"></div><div class="field"><label>Role</label><input data-staff="role" data-i="${i}" value="${esc(s.role)}"></div><div class="field"><label>Services</label><input data-staff="services" data-i="${i}" value="${esc((s.services||[]).join(', '))}"></div><label class="small"><input type="checkbox" data-staff="active" data-i="${i}" ${s.active!==false?'checked':''}> Active</label></div>`).join('')}</div>`;document.querySelectorAll('[data-staff]').forEach(el=>el.onchange=saveStaffSilent)}function addStaff(){data.staff.push({id:'s'+Date.now(),name:'New Technician',email:'',role:'Detailer',services:['Basic Refresh'],days:['Monday'],active:true});save();renderStaff()}function saveStaffSilent(){document.querySelectorAll('[data-staff]').forEach(el=>{const s=data.staff[Number(el.dataset.i)];const k=el.dataset.staff;s[k]=k==='active'?el.checked:k==='services'?el.value.split(',').map(x=>x.trim()).filter(Boolean):el.value});save();sync('saveStaff',{staffJson:JSON.stringify(data.staff)})}window.addStaff=addStaff;
function renderSettings(){const s=data.settings;document.getElementById('settings').innerHTML=`<div class="head"><div><span class="badge">Settings</span><h2>Business Settings</h2></div><p>Control business information, Instagram link, Google review link, deposit, GPS, QR and service area wording.</p></div><div class="grid2"><div class="card"><div class="inside"><div class="field"><label>Business Name</label><input id="businessName" value="${esc(s.businessName)}"></div><div class="field"><label>Phone</label><input id="phone" value="${esc(s.phone)}"></div><div class="field"><label>Email</label><input id="email" value="${esc(s.email)}"></div><div class="field"><label>Admin Email</label><input id="adminEmail" value="${esc(s.adminEmail)}"></div><div class="field"><label>Service Area Text</label><input id="serviceAreaText" value="${esc(s.serviceAreaText)}"></div></div></div><div class="card"><div class="inside"><div class="field"><label>Instagram Handle</label><input id="instagramHandle" value="${esc(s.instagramHandle)}"></div><div class="field"><label>Instagram URL</label><input id="instagramUrl" value="${esc(s.instagramUrl)}"></div><div class="field"><label>Google Review URL</label><input id="googleReviewUrl" value="${esc(s.googleReviewUrl)}"></div><div class="field"><label>Deposit Percent</label><input id="depositPercent" type="number" value="${Number(s.depositPercent||10)}"></div><label class="small"><input id="gpsEnabled" type="checkbox" ${s.gpsEnabled!==false?'checked':''}> GPS Tracking ON/OFF</label><label class="small"><input id="qrEnabled" type="checkbox" ${s.qrEnabled!==false?'checked':''}> QR Check-In ON/OFF</label><button class="btn" onclick="saveSettings()" style="margin-top:10px">Save Settings</button></div></div></div>`}function saveSettings(){['businessName','phone','email','adminEmail','serviceAreaText','instagramHandle','instagramUrl','googleReviewUrl'].forEach(id=>data.settings[id]=document.getElementById(id).value);data.settings.depositPercent=Number(document.getElementById('depositPercent').value)||10;data.settings.gpsEnabled=document.getElementById('gpsEnabled').checked;data.settings.qrEnabled=document.getElementById('qrEnabled').checked;save();sync('saveSettings',{settingsJson:JSON.stringify(data.settings)});toast('Settings saved.')}window.saveSettings=saveSettings;
function renderNotifications(){document.getElementById('notifications').innerHTML=`<div class="head"><div><span class="badge">Emails</span><h2>Notification Logic</h2></div><p>Production emails are handled by Apps Script. Customer and admin messages are sent on booking, confirmation, on-the-way, service started, completed receipt and review request.</p></div><div class="grid2"><div class="card"><div class="inside"><h3>Customer Emails</h3><ul class="small" style="margin-left:18px;line-height:1.9"><li>Booking received</li><li>Price confirmed</li><li>Appointment scheduled</li><li>Technician on the way</li><li>Service started from QR</li><li>Final receipt and review link</li></ul></div></div><div class="card"><div class="inside"><h3>Admin Emails</h3><ul class="small" style="margin-left:18px;line-height:1.9"><li>New booking</li><li>Customer photos uploaded</li><li>Deposit paid</li><li>Customer requested quote</li><li>Service completed</li><li>Cancellation</li></ul></div></div></div>`}
function render(){if(active==='dashboard')renderDashboard();if(active==='bookings')renderBookings();if(active==='scanner')renderScanner();if(active==='packages')renderPackages();if(active==='addons')renderAddons();if(active==='availability')renderAvailability();if(active==='gallery')renderGallery();if(active==='reviews')renderReviews();if(active==='coupons')renderCoupons();if(active==='staff')renderStaff();if(active==='settings')renderSettings();if(active==='notifications')renderNotifications();makeNav()}
document.getElementById('setupBtn').onclick=async()=>{try{const r=await jsonp('setup');toast(r.ok?'Sheet setup complete.':r.error||'Setup failed.')}catch(e){toast('Could not call setup. Paste updated code.gs and redeploy first.')}};
async function boot(){makeNav();try{const r=await jsonp('getAdminData');if(r&&r.ok){['packages','addons','gallery','reviews','coupons','settings','availability','staff','bookings','tracking','qrLogs','payments'].forEach(k=>{if(r[k])data[k]=r[k]});save()}}catch(e){}render()}boot();
</script></body></html>
