function escapeHtml(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function money(n){n=Number(n||0);return n?'$'+n.toFixed(0):'Quote'}
function readLS(k,f){try{return JSON.parse(localStorage.getItem(k)||'')||f}catch(e){return f}}
function writeLS(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){toast('Storage is full. Use fewer large photos for this demo.')}}
function api(action,params={}){if(!API_ENABLED){return Promise.resolve({ok:false,preview:true,skipped:true,action})}return new Promise((resolve,reject)=>{if(!API_URL){reject(new Error('missing api'));return}const cb='aa_admin_'+Math.random().toString(36).slice(2);const q=new URLSearchParams({action,callback:cb,...params});const s=document.createElement('script');let done=false;const cleanup=()=>{try{s.remove()}catch(e){}setTimeout(()=>{try{delete window[cb]}catch(e){}},60000)};const timer=setTimeout(()=>{if(done)return;done=true;window[cb]=function(){};cleanup();reject(new Error('API timeout'))},30000);window[cb]=res=>{if(done)return;done=true;clearTimeout(timer);cleanup();resolve(res)};s.onerror=()=>{if(done)return;done=true;clearTimeout(timer);window[cb]=function(){};cleanup();reject(new Error('API network error'))};s.src=API_URL+'?'+q.toString();document.body.appendChild(s)})}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}
function setButtonLoading(btn,on,label){
  if(!btn)return;
  if(on){btn.dataset.originalText=btn.dataset.originalText||btn.textContent;btn.disabled=true;btn.classList.add('is-loading');if(label)btn.setAttribute('aria-label',label)}
  else{btn.disabled=false;btn.classList.remove('is-loading');if(btn.dataset.originalText){btn.textContent=btn.dataset.originalText;delete btn.dataset.originalText}}
}
async function withButtonLoading(btn,label,fn){
  if(btn&&btn.disabled)return;
  setButtonLoading(btn,true,label||'Working');
  try{return await fn()}
  catch(err){console.error(err);toast(err&&err.message?err.message:'Action failed. Try again.')}
  finally{setButtonLoading(btn,false)}
}
async function syncApi(action,params){
  try{return await api(action,params)}
  catch(err){console.warn('API sync failed:',action,err&&err.message?err.message:err);toast('Saved on this device. Server sync did not finish.');return {ok:false,error:err&&err.message?err.message:String(err)}}
}

function bookingQrStarted(b){
  if(!b) return false;
  if(b.qrStarted===true) return true;
  const id=String(b.id||'');
  return String(b.status||'')==='Service Started' && (data.qrLogs||[]).some(l=>String(l.bookingId||'')===id && String(l.result||'').toLowerCase().includes('service started'));
}
function scanToken(raw){
  let v=String(raw||'').trim();
  if(!v) return '';
  try{v=decodeURIComponent(v)}catch(e){}
  try{
    if(/^https?:\/\//i.test(v)){
      const u=new URL(v);
      return (u.searchParams.get('qr')||u.searchParams.get('token')||u.searchParams.get('code')||u.searchParams.get('id')||v).trim();
    }
  }catch(e){}
  return v.replace(/^qr:/i,'').trim();
}
function findBookingFromScan(raw){
  const token=scanToken(raw);
  if(!token) return null;
  // Secure scanner flow: only the QR token starts service. A plain booking ID is not enough.
  return data.bookings.find(x=>String(x.qrData||'')===token)||null;

async function startByCode(raw){
  const token=scanToken(raw);
  if(!token){toast('Scan the customer QR or upload a clear QR photo.');return}
  const b=findBookingFromScan(raw);
  if(!b){toast('Secure QR token not found. A plain booking ID cannot start service.');return}
  if(String(b.status||'')==='Completed'){showCompletedQrReceipt(b);toast('Completed QR is receipt-only now.');return}
  let res=null;
  try{res=await api('validateQrStartService',{qr:token})}catch(e){toast('Could not validate QR with the server. Try again.');return}
  if(res&&res.completed){showCompletedQrReceipt(res.receipt||b);toast('Completed QR is receipt-only now.');return}
  if(res&&res.ok===false){toast(res.error||'QR could not start service.');return}
  data.qrLogs=[{id:'QR-'+Date.now(),bookingId:b.id,result:'Service started by secure QR scan',at:new Date().toLocaleString()},...(data.qrLogs||[])];
  updateBooking(b.id,{status:'Service Started',startedAt:new Date().toISOString(),qrStarted:true});
  toast('Secure QR validated. Service started and extras unlocked.');
  show('bookings');
  openBooking(b.id);
}
async function openCamera(){
  const wrap=$('#videoWrap');
  try{
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){toast('Camera not available. Upload a QR photo instead.');return}
    stopCamera();
    const constraints=[{video:{facingMode:{ideal:'environment'}},audio:false},{video:true,audio:false}];
    let lastError=null;
    for(const c of constraints){try{stream=await navigator.mediaDevices.getUserMedia(c);break}catch(e){lastError=e}}
    if(!stream)throw lastError||new Error('Camera unavailable');
    wrap.innerHTML='<video id="qrVideo" autoplay playsinline muted></video><canvas id="qrCanvas" hidden></canvas>';
    const video=$('#qrVideo');video.srcObject=stream;await video.play();
    toast('Camera opened. Point it at the customer QR.');
    if('BarcodeDetector' in window){try{detector=new BarcodeDetector({formats:['qr_code']})}catch(e){detector=null}}
    runQrLoop();
  }catch(e){toast('Camera permission failed. Upload a QR photo instead.')}
}
function runQrLoop(){
  const scan=async()=>{
    if(!stream)return;
    const raw=await decodeQrFromVideo();
    if(raw){stopCamera();startByCode(raw);return}
    scanTimer=requestAnimationFrame(scan);
  };
  scanTimer=requestAnimationFrame(scan);
}
async function decodeQrFromVideo(){
  const v=$('#qrVideo');if(!v||!v.videoWidth||!v.videoHeight)return '';
  try{if(detector){const codes=await detector.detect(v);if(codes&&codes.length)return codes[0].rawValue||''}}catch(e){}
  if(!window.jsQR)return '';
  const c=$('#qrCanvas')||document.createElement('canvas');const ctx=c.getContext('2d',{willReadFrequently:true});
  c.width=v.videoWidth;c.height=v.videoHeight;ctx.drawImage(v,0,0,c.width,c.height);
  return decodeQrFromCanvas(c);
}
function decodeQrFromCanvas(canvas){
  if(!window.jsQR)return '';
  const ctx=canvas.getContext('2d',{willReadFrequently:true});const img=ctx.getImageData(0,0,canvas.width,canvas.height);
  const code=window.jsQR(img.data,img.width,img.height,{inversionAttempts:'attemptBoth'});
  return code&&code.data?code.data:'';
}
function stopCamera(){if(scanTimer){cancelAnimationFrame(scanTimer);clearInterval(scanTimer)}scanTimer=null;if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}detector=null}
async function decodeQrImageFile(file){
  if(!file){return}
  if(!window.jsQR){toast('QR image decoder is still loading. Try again in a second.');return}
  const img=new Image();const url=URL.createObjectURL(file);
  img.onload=()=>{try{const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);const raw=decodeQrFromCanvas(c);URL.revokeObjectURL(url);if(raw)startByCode(raw);else toast('No QR found in that image. Try a clearer photo.')}catch(e){toast('Could not read that QR image.')}};
  img.onerror=()=>{URL.revokeObjectURL(url);toast('Could not load that image.')};img.src=url;
}
async function compressFile(file,max=1350,q=.78){return new Promise((resolve,reject)=>{const img=new Image();const rd=new FileReader();rd.onload=()=>{img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>max){const r=max/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',q));};img.onerror=reject;img.src=rd.result};rd.onerror=reject;rd.readAsDataURL(file)})}

document.addEventListener('change',e=>{if(e.target.id==='galMainFile')galleryFile('mainImage',e.target.files[0]);if(e.target.id==='galSecondFile')galleryFile('secondImage',e.target.files[0]);if(e.target.id==='qrPhotoInput')decodeQrImageFile(e.target.files[0]);});
function formIsFocused(){const el=document.activeElement;return !!(el&&['INPUT','TEXTAREA','SELECT'].includes(el.tagName));}
async function syncAdminData(){if(!API_ENABLED)return;try{const res=await api('getAdminData');if(res&&res.ok){data={...data,...res};hydrate();if(!formIsFocused())renderActive();}}catch(e){console.warn('Admin API sync skipped:',e&&e.message?e.message:e);}}
function load(){hydrate();renderTabs();renderActive();toast('Demo ready.');setTimeout(syncAdminData,250);}
load();
</script>
