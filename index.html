<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Auto Armor | Mobile Detailing</title>
    <meta name="theme-color" content="#020305" />
    <style>
      :root {
        --bg: #020305;
        --bg2: #060910;
        --panel: rgba(8, 13, 22, 0.88);
        --panel2: rgba(14, 20, 31, 0.82);
        --line: rgba(91, 178, 255, 0.24);
        --line2: rgba(255, 255, 255, 0.11);
        --text: #f6fbff;
        --muted: #a6b5c7;
        --soft: #dce9f8;
        --blue: #087cff;
        --blue2: #5fc9ff;
        --purple: #895bff;
        --silver: #e8eef5;
        --gold: #d8bf75;
        --red: #ff6578;
        --green: #58edb3;
        --r: 26px;
        --shadow: 0 30px 100px rgba(0, 0, 0, 0.72);
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #020305;
        color: var(--text);
      }
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          Arial,
          sans-serif;
        letter-spacing: 0.01em;
      }
      body:before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -5;
        background:
          radial-gradient(
            circle at 12% -8%,
            rgba(8, 124, 255, 0.18),
            transparent 32%
          ),
          radial-gradient(
            circle at 88% 0%,
            rgba(137, 91, 255, 0.14),
            transparent 30%
          ),
          linear-gradient(180deg, #07090f 0%, #020305 70%, #000 100%);
      }
      body:after {
        content: "";
        position: fixed;
        inset: -70px;
        z-index: -4;
        opacity: 0.36;
        background-image:
          linear-gradient(
            45deg,
            rgba(255, 255, 255, 0.022) 25%,
            transparent 25%,
            transparent 50%,
            rgba(255, 255, 255, 0.022) 50%,
            rgba(255, 255, 255, 0.022) 75%,
            transparent 75%
          ),
          linear-gradient(
            -45deg,
            rgba(95, 201, 255, 0.024) 25%,
            transparent 25%,
            transparent 50%,
            rgba(95, 201, 255, 0.016) 50%,
            rgba(95, 201, 255, 0.016) 75%,
            transparent 75%
          );
        background-size:
          36px 36px,
          36px 36px;
        filter: contrast(145%);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
        background: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
      }
      select option {
        background: #070d16;
        color: #fff;
      }
      input,
      select,
      textarea {
        width: 100%;
        min-height: 50px;
        border: 1px solid var(--line);
        outline: none;
        border-radius: 16px;
        background: linear-gradient(180deg, #0d1420, #060a11);
        color: #fff;
        padding: 13px 14px;
        font-size: 16px;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
      }
      textarea {
        resize: vertical;
        min-height: 105px;
      }
      label {
        font-size: 13px;
        font-weight: 900;
        color: #d9e6f5;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        max-width: 1280px;
        margin: 0 auto;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.035),
          rgba(255, 255, 255, 0.01)
        );
      }
      .header {
        position: relative;
        z-index: 20;
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 18px;
        align-items: center;
        padding: 14px clamp(16px, 3vw, 34px);
        border-bottom: 1px solid var(--line);
        background: rgba(3, 6, 11, 0.86);
        backdrop-filter: blur(16px);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.42);
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: max-content;
      }
      .shield {
        width: 46px;
        height: 46px;
        border: 1px solid rgba(95, 201, 255, 0.52);
        border-radius: 16px;
        display: grid;
        place-items: center;
        background: linear-gradient(
          145deg,
          rgba(8, 124, 255, 0.18),
          rgba(0, 0, 0, 0.35)
        );
        box-shadow: 0 0 28px rgba(8, 124, 255, 0.2);
      }
      .shield svg {
        width: 28px;
        height: 28px;
        stroke: var(--blue2);
      }
      .brand b {
        display: block;
        font-size: 21px;
        line-height: 1;
        font-weight: 1000;
        letter-spacing: 0.02em;
      }
      .brand span {
        display: block;
        color: var(--blue2);
        font-size: 12px;
        font-weight: 1000;
        letter-spacing: 0.22em;
        margin-top: 5px;
      }
      .nav {
        display: flex;
        gap: 8px;
        justify-content: center;
        overflow: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding: 4px 0;
      }
      .nav::-webkit-scrollbar {
        display: none;
      }
      .nav button {
        min-width: max-content;
        padding: 12px 15px;
        border-radius: 14px;
        color: #d7e5f4;
        font-size: 13px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.055em;
        border: 1px solid transparent;
      }
      .nav button.active {
        border-color: rgba(95, 201, 255, 0.55);
        background: linear-gradient(
          180deg,
          rgba(8, 124, 255, 0.25),
          rgba(8, 124, 255, 0.1)
        );
        box-shadow: 0 0 22px rgba(8, 124, 255, 0.16);
      }
      .header-actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .pill-btn,
      .primary,
      .ghost,
      .danger,
      .ok {
        min-height: 46px;
        padding: 0 18px;
        border-radius: 16px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.055em;
        font-size: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        white-space: nowrap;
      }
      .primary {
        background: linear-gradient(135deg, var(--blue), #0d65dd);
        box-shadow: 0 18px 48px rgba(8, 124, 255, 0.28);
      }
      .ghost {
        border: 1px solid var(--line2);
        background: rgba(255, 255, 255, 0.03);
      }
      .pill-btn {
        border: 1px solid var(--line);
        background: rgba(10, 18, 30, 0.7);
      }
      .danger {
        background: linear-gradient(135deg, #ff4e68, #b51732);
      }
      .ok {
        background: linear-gradient(135deg, #25c987, #0d8b68);
      }
      .main {
        overflow: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        scroll-behavior: smooth;
      }
      .main::-webkit-scrollbar {
        display: none;
      }
      .view {
        display: none;
        min-height: 100%;
        padding: clamp(18px, 3vw, 34px);
      }
      .view.active {
        display: block;
        animation: lift 0.36s ease both;
      }
      @keyframes lift {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .grid {
        display: grid;
        gap: 18px;
      }
      .two {
        grid-template-columns: minmax(0, 1.3fr) minmax(310px, 0.7fr);
      }
      .three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .four {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .panel,
      .card {
        border: 1px solid var(--line);
        border-radius: var(--r);
        background: linear-gradient(
          180deg,
          rgba(11, 17, 27, 0.9),
          rgba(5, 9, 15, 0.84)
        );
        box-shadow: var(--shadow);
        overflow: hidden;
        position: relative;
      }
      .panel:before,
      .card:before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(
          135deg,
          rgba(95, 201, 255, 0.08),
          transparent 26%,
          rgba(137, 91, 255, 0.05)
        );
        opacity: 0.7;
      }
      .inner {
        position: relative;
        padding: 22px;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid rgba(95, 201, 255, 0.38);
        border-radius: 999px;
        padding: 8px 11px;
        background: rgba(8, 124, 255, 0.12);
        color: var(--blue2);
        font-size: 12px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      h1 {
        font-size: clamp(44px, 8vw, 92px);
        line-height: 0.91;
        text-transform: uppercase;
        letter-spacing: -0.055em;
        font-weight: 1000;
        margin: 20px 0 14px;
        max-width: 820px;
      }
      h1 .blue {
        display: block;
        color: var(--blue);
        text-shadow: 0 0 34px rgba(8, 124, 255, 0.24);
      }
      h2 {
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: -0.035em;
        font-weight: 1000;
        margin: 12px 0;
      }
      h3 {
        font-size: 22px;
        line-height: 1.05;
        font-weight: 1000;
        margin-bottom: 8px;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
        font-size: 16px;
      }
      .lead {
        font-size: 20px;
        color: #f0f6ff;
        max-width: 760px;
      }
      .muted {
        color: var(--muted);
      }
      .hero {
        min-height: 560px;
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: 20px;
        align-items: stretch;
      }
      .hero-art {
        min-height: 440px;
        border-radius: var(--r);
        overflow: hidden;
        border: 1px solid var(--line);
        position: relative;
        background: #050910;
        box-shadow: var(--shadow);
      }
      .hero-art img {
        height: 100%;
        object-fit: cover;
        filter: saturate(0.95) contrast(1.08) brightness(0.72);
      }
      .hero-art:after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            90deg,
            rgba(2, 3, 5, 0.92),
            rgba(2, 3, 5, 0.2) 48%,
            rgba(2, 3, 5, 0.75)
          ),
          radial-gradient(
            circle at 75% 20%,
            rgba(8, 124, 255, 0.24),
            transparent 38%
          );
      }
      .hero-copy {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: clamp(24px, 5vw, 54px);
        z-index: 2;
      }
      .hero-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 26px;
      }
      .hero-actions button,
      .hero-actions a {
        min-width: 160px;
      }
      .statbar {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1px;
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.06);
      }
      .stat {
        padding: 17px 16px;
        background: rgba(6, 10, 17, 0.82);
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .stat svg {
        width: 24px;
        height: 24px;
        stroke: var(--blue2);
        flex: 0 0 auto;
      }
      .stat b {
        font-size: 13px;
        text-transform: uppercase;
      }
      .stat small {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-top: 2px;
      }
      .side-stack {
        display: grid;
        gap: 18px;
      }
      .feature-list {
        display: grid;
        gap: 16px;
      }
      .feature {
        display: grid;
        grid-template-columns: 42px 1fr;
        gap: 12px;
        align-items: start;
      }
      .feature .icon,
      .mini-icon {
        width: 42px;
        height: 42px;
        border-radius: 15px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(95, 201, 255, 0.28);
        background: rgba(8, 124, 255, 0.11);
        color: var(--blue2);
        font-weight: 1000;
      }
      .feature b {
        display: block;
        text-transform: uppercase;
        font-size: 14px;
      }
      .feature span {
        display: block;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
        margin-top: 4px;
      }
      .mini-photo {
        height: 150px;
        border-radius: 18px;
        object-fit: cover;
        margin-top: 14px;
        filter: saturate(0.98) brightness(0.85);
      }
      .process {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }
      .process-card {
        padding: 18px;
        border: 1px solid var(--line2);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.035);
      }
      .process-card strong {
        font-size: 34px;
        color: var(--blue);
      }
      .process-card b {
        display: block;
        text-transform: uppercase;
        margin: 8px 0 5px;
      }
      .process-card span {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }
      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }
      .section-head p {
        max-width: 660px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 1000;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        border: 1px solid rgba(95, 201, 255, 0.38);
        color: var(--blue2);
        background: rgba(8, 124, 255, 0.11);
      }
      .badge.purple {
        border-color: rgba(137, 91, 255, 0.5);
        color: #c9b7ff;
        background: rgba(137, 91, 255, 0.13);
      }
      .badge.gold {
        border-color: rgba(216, 191, 117, 0.5);
        color: var(--gold);
        background: rgba(216, 191, 117, 0.11);
      }
      .package-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 20px;
      }
      .pkg-card {
        min-height: 100%;
        display: flex;
        flex-direction: column;
      }
      .pkg-card.featured {
        border-color: rgba(8, 124, 255, 0.72);
        box-shadow:
          0 0 0 1px rgba(8, 124, 255, 0.36),
          0 34px 110px rgba(8, 124, 255, 0.14);
      }
      .pkg-img {
        height: 190px;
        object-fit: cover;
        filter: brightness(0.82) contrast(1.07);
        border-bottom: 1px solid var(--line);
      }
      .pkg-body {
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        flex: 1;
      }
      .price-list {
        display: grid;
        gap: 8px;
      }
      .price-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding-bottom: 8px;
      }
      .price-row span {
        text-transform: uppercase;
        color: #c5d5e6;
        font-weight: 900;
        font-size: 13px;
      }
      .price-row b {
        font-size: 23px;
      }
      .features {
        display: grid;
        gap: 9px;
        margin: 4px 0 6px;
      }
      .check {
        display: grid;
        grid-template-columns: 21px 1fr;
        gap: 9px;
        align-items: start;
        color: #d5e4f3;
        font-size: 14px;
      }
      .check i {
        width: 21px;
        height: 21px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        border: 1px solid rgba(95, 201, 255, 0.42);
        background: rgba(8, 124, 255, 0.11);
        font-style: normal;
        color: var(--blue2);
        font-size: 12px;
        font-weight: 1000;
      }
      .pkg-card .primary,
      .pkg-card .ghost {
        margin-top: auto;
      }
      .booking-shell {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 350px;
        gap: 20px;
      }
      .stepper {
        display: flex;
        gap: 8px;
        overflow: auto;
        scrollbar-width: none;
        margin-bottom: 16px;
      }
      .stepper::-webkit-scrollbar {
        display: none;
      }
      .step-pill {
        min-width: max-content;
        padding: 10px 13px;
        border: 1px solid var(--line2);
        border-radius: 999px;
        color: var(--muted);
        font-weight: 1000;
        text-transform: uppercase;
        font-size: 12px;
      }
      .step-pill.active {
        border-color: rgba(95, 201, 255, 0.55);
        color: #fff;
        background: rgba(8, 124, 255, 0.15);
      }
      .step-card {
        display: none;
      }
      .step-card.active {
        display: block;
      }
      .choice-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .choice {
        border: 1px solid var(--line2);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.035);
        padding: 16px;
        text-align: left;
        min-height: 94px;
        display: grid;
        gap: 8px;
        position: relative;
      }
      .choice b {
        font-size: 16px;
      }
      .choice span {
        font-size: 13px;
        color: var(--muted);
      }
      .choice.active {
        border-color: rgba(95, 201, 255, 0.72);
        background: linear-gradient(
          180deg,
          rgba(8, 124, 255, 0.18),
          rgba(255, 255, 255, 0.035)
        );
        box-shadow: 0 0 24px rgba(8, 124, 255, 0.12);
      }
      .choice.active:after {
        content: "✓";
        position: absolute;
        right: 14px;
        top: 14px;
        width: 25px;
        height: 25px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--blue);
        font-weight: 1000;
        font-size: 13px;
      }
      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .field {
        display: grid;
        gap: 7px;
      }
      .wide {
        grid-column: 1/-1;
      }
      .summary {
        position: sticky;
        top: 18px;
        display: grid;
        gap: 14px;
      }
      .summary-line {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        padding: 9px 0;
      }
      .summary-line strong {
        font-size: 22px;
      }
      .notice {
        border: 1px solid rgba(216, 191, 117, 0.36);
        background: rgba(216, 191, 117, 0.08);
        border-radius: 18px;
        padding: 14px;
        color: #f1dfad;
        font-size: 14px;
        line-height: 1.5;
      }
      .agreement {
        display: grid;
        gap: 12px;
      }
      .agree-row {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 11px;
        align-items: start;
        border: 1px solid var(--line2);
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.035);
      }
      .agree-row input {
        width: 22px;
        height: 22px;
        min-height: auto;
        margin-top: 1px;
        accent-color: var(--blue);
      }
      .agree-row span {
        font-size: 14px;
        line-height: 1.5;
        color: #d8e5f5;
      }
      .file-drop {
        border: 1px dashed rgba(95, 201, 255, 0.45);
        border-radius: 20px;
        padding: 18px;
        background: rgba(8, 124, 255, 0.06);
        display: grid;
        gap: 12px;
      }
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }
      .photo-thumb {
        height: 105px;
        object-fit: cover;
        border-radius: 16px;
        border: 1px solid var(--line);
      }
      .results-grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr 0.8fr;
        gap: 18px;
      }
      .result-card {
        min-height: 230px;
      }
      .result-card.large {
        grid-row: span 2;
      }
      .result-card img {
        height: 235px;
        object-fit: cover;
        filter: brightness(0.82) contrast(1.08);
      }
      .result-card.large img {
        height: 390px;
      }
      .result-meta {
        padding: 16px;
      }
      .result-meta h3 {
        font-size: 21px;
      }
      .result-meta p {
        font-size: 14px;
      }
      .result-card .badge {
        margin-bottom: 9px;
      }
      .review-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 18px;
      }
      .stars {
        color: var(--gold);
        letter-spacing: 0.08em;
        font-size: 18px;
        margin-bottom: 9px;
      }
      .review-card {
        padding: 20px;
      }
      .review-card p {

        return new Promise((resolve, reject) => {
          if (!API_URL) {
            reject(new Error("missing api"));
            return;
          }
          const cb = "aa_cb_" + Math.random().toString(36).slice(2);
          const q = new URLSearchParams({ action, callback: cb, ...params });
          const s = document.createElement("script");
          let done = false;
          const timer = setTimeout(() => {
            if (done) return;
            done = true;
            window[cb] = function () {};
            setTimeout(() => {
              try {
                delete window[cb];
              } catch (e) {}
            }, 60000);
            s.remove();
            reject(new Error("API timeout"));
          }, 30000);
          window[cb] = (res) => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            try {
              delete window[cb];
            } catch (e) {}
            s.remove();
            resolve(res);
          };
          s.onerror = () => {
            if (done) return;
            done = true;
            clearTimeout(timer);
            window[cb] = function () {};
            setTimeout(() => {
              try {
                delete window[cb];
              } catch (e) {}
            }, 60000);
            s.remove();
            reject(new Error("API network error"));
          };
          s.src = API_URL + "?" + q.toString();
          document.body.appendChild(s);

    ${field("customerName", "Full Name", "text", "Your name")}${field("phone", "Phone", "tel", "(904) 000-0000")}${field("email", "Email", "email", "you@email.com")}${field("vehicleInfo", "Vehicle Info", "text", "Year, make, model, color")}
    <div class="field wide"><label>Service Address</label><input id="address" value="${escapeHtml(booking.address || "")}" placeholder="Street address"></div>

  </div></div>`;
          ["locationType"].forEach((id) => {

        if (step === 4) {

        }
        if (step === 5) {
          host.innerHTML = `<div class="step-card active"><h3>Agreement, cancellation & deposit</h3><div class="agreement">
    <div class="notice"><b>Estimate notice:</b> Some prices may change after visual inspection, heavy condition, oversized vehicles, excessive pet hair, stains, odor, or added services requested on site.</div>
    <label class="agree-row"><input type="checkbox" id="agreeService" ${booking.agreeService ? "checked" : ""}><span>I understand this is a mobile detailing request and the final price may be confirmed by Auto Armor before service starts.</span></label>
    <label class="agree-row"><input type="checkbox" id="agreeCancel" ${booking.agreeCancel ? "checked" : ""}><span>I understand cancellations or reschedules should be requested as early as possible. Same-day cancellations may affect deposit eligibility.</span></label>

        host.insertAdjacentHTML(

          `<div style="height:18px"></div><div style="display:flex;gap:10px;flex-wrap:wrap"><button class="ghost" id="backStep" ${step === 0 ? 'disabled style="opacity:.45"' : ""}>Back</button><button class="primary" id="nextStep">${step === 5 ? "Reserve Now" : "Next Step"}</button></div>`,

      function renderSummary() {

      function saveForm() {
        [
          "customerName",
          "phone",
          "email",
          "vehicleInfo",
          "address",
          "city",
          "locationType",
          "appointmentDate",
          "appointmentTime",

      async function compressFile(file, max = 1300, q = 0.78) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          const rd = new FileReader();
          rd.onload = () => {
            img.onload = () => {
              let w = img.width,
                h = img.height;
              if (Math.max(w, h) > max) {
                const r = max / Math.max(w, h);
                w = Math.round(w * r);
                h = Math.round(h * r);
              }
              const c = document.createElement("canvas");
              c.width = w;
              c.height = h;
              c.getContext("2d").drawImage(img, 0, 0, w, h);
              resolve(c.toDataURL("image/jpeg", q));
            };
            img.onerror = reject;
            img.src = rd.result;
          };
          rd.onerror = reject;
          rd.readAsDataURL(file);
        });
      }
      async function handlePhotos(e) {
        const files = Array.from(e.target.files || []).slice(0, 8);
        for (const f of files) {
          try {
            booking.photos.push(await compressFile(f));
          } catch (err) {}
        }
        renderStep();
      }
      function bookingStore() {
        return readLS("aa_bookings_demo", []);
      }
      function saveBookingLocal(b) {
        const list = bookingStore();
        const i = list.findIndex((x) => x.id === b.id);
        if (i >= 0) list[i] = b;
        else list.push(b);
        writeLS("aa_bookings_demo", list);
      }
      async function reserve() {
        saveForm();
        if (
          !booking.customerName ||
          !booking.phone ||
          !booking.email ||
          !booking.address
        ) {
          alert("Please complete name, phone, email and address.");
          step = 3;
          renderBook();
          return;
        }
        if (
          !booking.agreeService ||
          !booking.agreeCancel ||
          !booking.agreeDeposit
        ) {
          alert(
            "Please accept the service, cancellation and deposit agreement.",
          );
          step = 5;
          renderBook();
          return;
        }
        const id = "AA-" + Math.floor(10000 + Math.random() * 90000);
        const b = {
          ...booking,
          id,
          status: "Request Received",
          packageName: currentPackage().name,
          addonNames: selectedAddons().map((a) => a.name),
          subtotal: subtotal(),
          discount: discount(),
          travelFee: travelFee(),
          total: total(),
          depositPaid: 0,
          balance: total(),
          photoCount: (booking.photos || []).length,
          qrData: id,
          timeline: [
            {
              status: "Request Received",
              at: new Date().toISOString(),
              note: "Booking request created.",
            },
          ],
          balanceAction: "Not requested",
        };
        saveBookingLocal(b);
        api("createBooking", {
          bookingJson: JSON.stringify({ ...b, photos: [] }),
        }).catch(() => {});
        $("#stepHost").innerHTML =
          `<div class="step-card active"><span class="badge">Booking Received</span><h2>${id}</h2><p>Your request was received. Keep this confirmation code and QR ready for arrival.</p><div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(id)}" alt="Confirmation QR"><div class="qr-code-text">${id}</div></div><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px"><button class="primary" data-track-id="${id}">Track My Service</button><button class="ghost" data-go="home">Back Home</button></div></div>`;
      }
      function renderGallery() {
        const items = gallery();
        $("#galleryView").innerHTML =
          `<div class="section-head"><div><span class="badge">Results Gallery</span><h2>Detail-focused visuals.</h2><p>Finished work, transformations and premium results from detailing services.</p></div><button class="primary" data-go="book">Book Now</button></div><div class="results-grid">${items.map((g, i) => `<article class="card result-card ${i === 0 ? "large" : ""}"><img src="${g.image || g.mainImage || DEMO_IMAGES.result1}" alt="${escapeHtml(g.title)}"><div class="result-meta"><span class="badge ${i === 0 ? "purple" : ""}">${escapeHtml(g.category || g.service || "Result")}</span><h3>${escapeHtml(g.title || "Detail Result")}</h3><p>${escapeHtml(g.description || "Finished detailing result.")}</p></div></article>`).join("")}</div>`;
      }
      function renderReviews() {
        $("#reviewsView").innerHTML =
          `<div class="section-head"><div><span class="badge">Customer Reviews</span><h2>Real feedback from mobile details.</h2></div></div><div class="review-grid">${reviews()
            .map(
              (r) =>
                `<article class="card review-card"><div class="stars">${"★".repeat(Number(r.rating || 5))}</div><p>“${escapeHtml(r.text)}”</p><b>${escapeHtml(r.name)}</b><small>${escapeHtml(r.service || "Mobile Detail")}</small></article>`,
            )
            .join(
              "",
            )}</div><div style="height:20px"></div><div class="panel"><div class="inner"><span class="badge">Leave A Review</span><h3 style="margin-top:10px">How did your vehicle look?</h3><div class="field-grid"><div class="field"><label>Name</label><input id="revName" placeholder="Your name"></div><div class="field"><label>Service</label><input id="revService" placeholder="Full Detail"></div><div class="field"><label>Rating</label><select id="revRating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div><div class="field wide"><label>Review</label><textarea id="revText" placeholder="Tell us about your experience"></textarea></div></div><div style="height:12px"></div><button class="primary" id="sendReview">Send Review</button></div></div>`;
      }
      function renderTrack(result) {
        $("#trackView").innerHTML =
          `<div class="track-card panel"><div class="inner"><span class="badge">Service Tracking</span><h2>Track your detail.</h2><p>Enter your confirmation code to see service status, schedule changes, payment requests and final receipt.</p><div style="height:14px"></div><div class="field-grid"><div class="field"><label>Confirmation Code</label><input id="trackId" placeholder="AA-12345" value="${escapeHtml(new URLSearchParams(location.search).get("track") || "")}"></div><div class="field" style="align-self:end"><button class="primary" id="trackBtn">Search</button></div></div><div id="trackResult">${result || ""}</div></div></div>`;
      }
      function trackHtml(b, tracking) {
        const status = b.status || "Request Received";
        const doneIndex = Math.max(
          0,
          TRACK_STEPS.findIndex((s) => s === status),
        );
        const proposal =
          b.proposal && b.proposal.status === "pending"
            ? `<div class="notice"><b>Schedule update requested:</b><br>New date: ${escapeHtml(b.proposal.date)} • New time: ${escapeHtml(b.proposal.time)}<br>Reason: ${escapeHtml(b.proposal.reason || "Schedule adjustment")}<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px"><button class="ok" data-accept-proposal="${b.id}">Accept New Time</button><button class="danger" data-cancel-proposal="${b.id}">Cancel Booking</button><a class="ghost" href="tel:9046018480">Call Owner</a></div></div>`
            : "";
        const pay =
          b.balanceAction === "Due Now" || status === "Payment Required"
            ? `<div class="payment-alert"><b>Payment action required:</b> Balance due now: ${money(b.balance || 0)}.<div style="margin-top:10px"><a class="primary" href="#" onclick="alert('Demo payment button. Stripe, Square, Zelle or invoice link can be connected in settings.');return false">Pay Balance</a></div></div>`
            : "";
        const qr = `<div class="qr-box"><img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=${encodeURIComponent(b.id)}" alt="Confirmation QR"><div class="qr-code-text">${escapeHtml(b.id)}</div></div>`;
        return `<div style="height:18px"></div><div class="panel"><div class="inner"><h3>${escapeHtml(b.packageName || "Mobile Detail")}</h3><p>${escapeHtml(b.vehicleInfo || b.vehicleType || "Vehicle")} • ${escapeHtml(b.appointmentDate || "Date pending")} ${escapeHtml(b.appointmentTime || "")}</p>${qr}${proposal}${pay}<div class="summary-line"><span>Total</span><b>${money(b.total)}</b></div><div class="summary-line"><span>Balance</span><b>${money(b.balance)}</b></div><div class="timeline">${TRACK_STEPS.map((s, i) => `<div class="timeline-step ${i <= doneIndex || s === status ? "done" : ""}"><div class="dot">${i + 1}</div><div><b>${s}</b><p>${s === status ? "Current status" : "Status update"}</p></div></div>`).join("")}</div></div></div>`;
      }
      async function searchTrack() {
        const id = ($("#trackId")?.value || "").trim();
        if (!id) return;
        let b = bookingStore().find((x) => String(x.id) === id);
        let tracking = null;
        try {
          const res = await api("getBooking", { id });
          if (res && res.ok) {
            b = { ...b, ...res.booking };
            tracking = res.tracking || null;
          }
        } catch (e) {}
        $("#trackResult").innerHTML = b
          ? trackHtml(b, tracking)
          : `<div class="notice" style="margin-top:14px">No service found with that confirmation code.</div>`;
      }
      function submitReview() {
        const r = {
          id: "R-" + Date.now(),
          name: $("#revName").value || "Customer",
          service: $("#revService").value || "Mobile Detail",
          rating: Number($("#revRating").value || 5),
          text: $("#revText").value || "",
          status: "pending",
          featured: false,
        };
        if (!r.text.trim()) {
          alert("Please write your review.");
          return;
        }
        const list = readLS("aa_reviews_demo", []);
        list.push(r);
        writeLS("aa_reviews_demo", list);
        api("submitReview", { reviewJson: JSON.stringify(r) }).catch(() => {});
        alert("Thank you for sharing your experience.");
        $("#revName").value = "";
        $("#revText").value = "";
      }
      async function respondProposal(id, response) {
        const list = bookingStore();
        const i = list.findIndex((x) => x.id === id);
        if (i >= 0) {
          const b = list[i];
          if (response === "accepted") {
            b.status = "Appointment Scheduled";
            b.appointmentDate = b.proposal.date;
            b.appointmentTime = b.proposal.time;
            b.proposal.status = "accepted";
          } else {
            b.status = "Canceled";
            b.proposal.status = "canceled";
          }
          list[i] = b;
          writeLS("aa_bookings_demo", list);
        }
        api("respondScheduleProposal", { id, response }).catch(() => {});
        searchTrack();
      }
      document.addEventListener("click", (e) => {
        const goId = e.target.closest("[data-go]")?.dataset.go;
        if (goId) {
          go(goId);
          return;
        }
        const p = e.target.closest("[data-pick-package]")?.dataset.pickPackage;
        if (p) {
          booking.packageId = p;
          go("book");
          step = 1;
          renderBook();
          return;
        }
        const st = e.target.closest("[data-step]")?.dataset.step;
        if (st !== undefined) {
          saveForm();
          step = Number(st);
          renderBook();
          return;
        }
        const v = e.target.closest("[data-vehicle]")?.dataset.vehicle;
        if (v) {
          booking.vehicleType = v;
          renderBook();
          return;
        }
        const pack = e.target.closest("[data-package]")?.dataset.package;
        if (pack) {
          booking.packageId = pack;
          renderBook();
          return;
        }
        const ad = e.target.closest("[data-addon]")?.dataset.addon;
        if (ad) {
          booking.addons = booking.addons.includes(ad)
            ? booking.addons.filter((x) => x !== ad)
            : booking.addons.concat(ad);
          renderBook();
          return;
        }
        if (e.target.id === "backStep") {
          saveForm();
          step = Math.max(0, step - 1);
          renderBook();
          return;
        }
        if (e.target.id === "nextStep") {
          saveForm();
          if (step < 5) {
            step++;
            renderBook();
          } else reserve();
          return;
        }
        const tid = e.target.closest("[data-track-id]")?.dataset.trackId;
        if (tid) {
          go("track");
          setTimeout(() => {
            $("#trackId").value = tid;
            searchTrack();
          }, 40);
          return;
        }
        if (e.target.id === "trackBtn") {
          searchTrack();
          return;
        }
        if (e.target.id === "sendReview") {
          submitReview();
          return;
        }
        const acc = e.target.closest("[data-accept-proposal]")?.dataset
          .acceptProposal;
        if (acc) {
          respondProposal(acc, "accepted");
          return;
        }
        const can = e.target.closest("[data-cancel-proposal]")?.dataset
          .cancelProposal;
        if (can) {
          respondProposal(can, "canceled");
          return;
        }
      });
      document.addEventListener("input", (e) => {
        if (e.target.id === "couponInput") {
          booking.coupon = e.target.value;
          renderSummary();
        }
      });
      document.addEventListener("change", (e) => {
        if (e.target.id === "vehiclePhotos") handlePhotos(e);
      });
      async function init() {
        nav();
        api("getPublicData")
          .then((res) => {
            if (res && res.ok) {
              data = { ...data, ...res };
              renderActive();
            }
          })
          .catch(() => {});
        const q = new URLSearchParams(location.search);
        if (q.get("track")) {
          active = "track";
          $$(".view").forEach((v) => v.classList.remove("active"));
          $("#trackView").classList.add("active");
          nav();
          renderTrack();
          setTimeout(searchTrack, 80);
        } else {
          const h = location.hash.replace("#", "");
          if (VIEWS.some((v) => v[0] === h)) active = h;
          $$(".view").forEach((v) => v.classList.remove("active"));
          $("#" + active + "View").classList.add("active");
          nav();
          renderActive();
        }
      }
      init();
    </script>
