<!DOCTYPE html>

<style>

*{box-sizing:border-box;margin:0;padding:0} html,body{min-height:100%;overflow:hidden} body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
body:before{content:"";position:fixed;inset:0;z-index:-4;background:radial-gradient(circle at 12% -8%,rgba(9,124,255,.22),transparent 33%),radial-gradient(circle at 96% 2%,rgba(139,92,255,.16),transparent 30%),linear-gradient(180deg,#07090e 0%,#020305 62%,#000 100%)}

button,input,select,textarea{font:inherit;color:inherit} button{border:0;cursor:pointer} a{color:inherit;text-decoration:none} img{display:block;max-width:100%} select option{background:#090e17;color:#fff}

.app{height:100dvh;display:grid;grid-template-rows:auto 1fr;max-width:1720px;margin:0 auto;padding:14px;gap:14px}
.header{height:76px;border:1px solid var(--line);border-radius:24px;background:rgba(2,4,8,.78);backdrop-filter:blur(18px);display:flex;align-items:center;justify-content:space-between;padding:12px 14px;box-shadow:0 18px 55px rgba(0,0,0,.38)}

.stage{min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 400px;gap:14px} .main,.side{min-height:0;overflow:auto;scrollbar-width:none} .main::-webkit-scrollbar,.side::-webkit-scrollbar,.scroll-x::-webkit-scrollbar{display:none}
.view{display:none;min-height:100%;animation:fade .25s ease} .view.active{display:block} @keyframes fade{from{opacity:.5;transform:translateY(6px)}to{opacity:1;transform:none}}
.panel,.hero,.card,.pkg,.review,.gallery-card,.track-card{border:1px solid var(--line);background:linear-gradient(155deg,rgba(11,16,24,.92),rgba(4,7,12,.94));border-radius:var(--r);box-shadow:var(--shadow)} .panel{padding:18px}
.hero{min-height:calc(100dvh - 112px);position:relative;overflow:hidden;display:grid;align-content:end;padding:38px;isolation:isolate} .hero:before{content:"";position:absolute;inset:0;z-index:-2;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.92)),linear-gradient(90deg,rgba(0,0,0,.88),rgba(0,0,0,.18)),url('https://unsplash.com/photos/CsZjHjFN3N8/download?force=true') center/cover no-repeat;filter:saturate(.92) contrast(1.12)} .hero:after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(135deg,rgba(99,199,255,.14),transparent 42%,rgba(139,92,255,.10))}

.side{display:grid;gap:14px} .side-card{border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(155deg,rgba(12,18,28,.88),rgba(3,6,11,.92));padding:16px;overflow:hidden} .side-card h3{font-size:21px;letter-spacing:-.03em} .side-card p{margin-top:7px} .side-photo{height:178px;border-radius:20px;overflow:hidden;border:1px solid var(--line2);margin-top:12px} .side-photo img{width:100%;height:100%;object-fit:cover}
.process{display:grid;grid-template-columns:repeat(4,1fr);gap:10px} .process .card{padding:16px;min-height:135px} .num{font-size:32px;color:var(--blue2);font-weight:1000} .card h3{font-size:17px;margin-top:7px} .card p{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.45}
.section-head{display:flex;align-items:end;justify-content:space-between;gap:14px;margin:0 0 14px} .section-head h2,.view>h2{font-size:34px;letter-spacing:-.055em} .section-head p{max-width:560px;color:var(--muted);font-size:15px;line-height:1.45}
.pkg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px} .pkg{padding:15px;display:grid;gap:13px;position:relative;overflow:hidden} .pkg.featured{border-color:rgba(99,199,255,.68);box-shadow:0 0 0 1px rgba(99,199,255,.14),0 24px 80px rgba(9,124,255,.18)} .pkg.premium{border-color:rgba(139,92,255,.58)} .pkg-img{height:168px;border-radius:21px;border:1px solid var(--line2);overflow:hidden;background:#060a10} .pkg-img img{width:100%;height:100%;object-fit:cover;filter:saturate(.95) contrast(1.08)} .pkg-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start} .pkg h3{font-size:27px;line-height:1;letter-spacing:-.045em;text-transform:uppercase} .pkg .desc{font-size:15px;color:var(--soft);margin-top:5px} .from{text-align:right;font-size:12px;color:var(--muted);font-weight:900} .from b{display:block;color:#fff;font-size:31px;letter-spacing:-.06em}
.price-list{display:grid;gap:0} .row{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.09);padding:8px 0;color:var(--soft);font-size:15px} .row strong{font-size:17px;color:#fff} .feature-list{display:grid;gap:8px} .feature{display:flex;align-items:flex-start;gap:9px;color:var(--soft);font-size:15px;line-height:1.35} .dot{flex:0 0 19px;width:19px;height:19px;border:1px solid rgba(99,199,255,.55);background:radial-gradient(circle,rgba(99,199,255,.32),rgba(9,124,255,.08));border-radius:7px;display:grid;place-items:center;margin-top:1px} .dot:after{content:"";width:7px;height:4px;border-left:2px solid #dff5ff;border-bottom:2px solid #dff5ff;transform:rotate(-45deg);margin-top:-2px}
.book-wrap{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px} .steps{display:grid;gap:8px} .step{text-align:left;border:1px solid var(--line2);background:rgba(255,255,255,.04);border-radius:17px;padding:12px;color:#a9b9ca;font-weight:1000} .step.active{color:#fff;border-color:rgba(99,199,255,.55);background:rgba(9,124,255,.14)} .book-card{padding:18px;border:1px solid var(--line);border-radius:var(--r);background:linear-gradient(155deg,rgba(12,18,28,.9),rgba(4,7,12,.94))} .choice-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .choice{border:1px solid var(--line2);border-radius:19px;background:rgba(255,255,255,.045);padding:14px;text-align:left;min-height:92px;display:grid;gap:7px;position:relative} .choice.active{border-color:rgba(99,199,255,.75);box-shadow:inset 0 0 0 1px rgba(99,199,255,.18),0 18px 42px rgba(9,124,255,.12)} .choice b{font-size:16px} .choice span{color:var(--muted);font-size:13px} .choice-mark{position:absolute;right:12px;top:12px;width:22px;height:22px;border-radius:9px;border:1px solid var(--line);background:#050910} .choice.active .choice-mark{background:linear-gradient(135deg,var(--blue),var(--blue2));border:0} .choice.active .choice-mark:after{content:"";position:absolute;left:7px;top:5px;width:7px;height:4px;border-left:2px solid #00101e;border-bottom:2px solid #00101e;transform:rotate(-45deg)} .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px} .full{grid-column:1/-1}
.upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px} .upload{border:1px dashed rgba(99,199,255,.38);border-radius:18px;background:rgba(9,124,255,.055);padding:14px;min-height:94px;display:grid;place-items:center;text-align:center;gap:6px;position:relative;overflow:hidden} .upload input{position:absolute;inset:0;opacity:0;cursor:pointer} .summary{display:grid;gap:4px} .total{font-size:20px;color:#fff} .policy{display:flex;align-items:flex-start;gap:12px;border:1px solid rgba(99,199,255,.24);border-radius:18px;background:rgba(9,124,255,.08);padding:14px;margin-top:12px} .policy input{width:22px;min-height:22px;accent-color:#1193ff;flex:0 0 22px;margin-top:2px}
.gallery-grid{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:14px} .gallery-card{overflow:hidden} .gallery-card.big{grid-row:span 2} .gallery-media{height:210px;position:relative;overflow:hidden} .gallery-card.big .gallery-media{height:450px} .gallery-media img{width:100%;height:100%;object-fit:cover;filter:saturate(.95) contrast(1.08)} .gallery-body{padding:14px} .gallery-body h3{font-size:21px} .gallery-body p{margin-top:5px}
.review-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px} .review{padding:18px} .stars{color:#ffd978;letter-spacing:2px;font-size:18px;margin-bottom:10px} .review p{font-size:16px;line-height:1.48;color:#e7f1fb} .review b{display:block;margin-top:12px}
.track-wrap{display:grid;grid-template-columns:380px 1fr;gap:14px} .qr{border-radius:22px;background:#fff;padding:12px;width:190px;margin:12px auto} .qr img{width:100%} .status-list{display:grid;gap:10px} .status{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line2);background:rgba(255,255,255,.04);border-radius:18px;padding:12px} .node{width:22px;height:22px;border-radius:50%;border:1px solid var(--line);background:#07101a;flex:0 0 22px;margin-top:2px} .status.done .node{background:linear-gradient(135deg,var(--blue),var(--blue2));border:0;box-shadow:0 0 22px rgba(99,199,255,.25)} .proposal{border:1px solid rgba(222,192,111,.42);background:rgba(222,192,111,.10);border-radius:18px;padding:14px;margin-bottom:12px}
.toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,20px);opacity:0;pointer-events:none;background:#07101a;border:1px solid var(--line);border-radius:16px;padding:12px 15px;box-shadow:var(--shadow);z-index:50;transition:.25s} .toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:1180px){.stage{grid-template-columns:1fr}.side{display:none}.pkg-grid,.gallery-grid,.review-grid{grid-template-columns:1fr 1fr}.hero{min-height:560px}.trust{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.app{padding:8px;gap:8px}.header{height:auto;align-items:flex-start;border-radius:22px;gap:10px;flex-wrap:wrap}.brand h1{font-size:19px}.nav{order:3;width:100%;overflow:auto;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}.nav button{white-space:nowrap;padding:10px 11px}.actions .phone-hide{display:none}.main{padding-bottom:2px}.hero{min-height:calc(100dvh - 152px);padding:22px;border-radius:22px}.hero h2{font-size:48px}.hero p{font-size:16px}.trust{grid-template-columns:1fr 1fr}.process,.pkg-grid,.choice-grid,.form-grid,.upload-grid,.gallery-grid,.review-grid,.track-wrap,.book-wrap{grid-template-columns:1fr}.steps{display:flex;overflow:auto;scrollbar-width:none}.step{min-width:max-content}.pkg-img{height:190px}.gallery-card.big .gallery-media,.gallery-media{height:250px}.section-head{align-items:flex-start;flex-direction:column}.section-head h2{font-size:30px}}
</style>

<body>
<div class="app">
  <header class="header">
    <a class="brand" data-go="home" href="#">
      <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2 21 6v6c0 5.2-3.7 8.4-9 10-5.3-1.6-9-4.8-9-10V6l9-4Z" stroke="#63c7ff" stroke-width="1.8"/><path d="M7 12h10M9 16l6-8" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/></svg></div>
      <div><h1>Auto Armor</h1><p>Mobile Detailing</p></div>
    </a>
    <nav class="nav" id="nav"></nav>
    <div class="actions"><a class="btn ghost phone-hide" href="tel:9046018480">Call / Text</a><button class="btn primary" data-go="book">Book Now</button></div>
  </header>
  <div class="stage">
    <main class="main" id="main">
      <section class="view active" id="homeView"></section>
      <section class="view" id="packagesView"></section>
      <section class="view" id="bookView"></section>
      <section class="view" id="galleryView"></section>
      <section class="view" id="reviewsView"></section>
      <section class="view" id="trackView"></section>
    </main>
    <aside class="side" id="sidePanel"></aside>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz5MfcLAb7X0xLrqVkMwcLQ0EAawxQz1rlIDqqalNpkjspiuTIgF6WMdXp4ZP-x3MiauA/exec';
const IMG = {'polish': 'https://unsplash.com/photos/CsZjHjFN3N8/download?force=true', 'interior': 'https://unsplash.com/photos/U4IaoKF5aj4/download?force=true', 'buffer': 'https://unsplash.com/photos/cw1914zDHUs/download?force=true', 'paint': 'https://unsplash.com/photos/wTW51lUpC6k/download?force=true', 'wash': 'https://unsplash.com/photos/phP5Qa0CauQ/download?force=true', 'wheel': 'https://unsplash.com/photos/8k_T1EwTySs/download?force=true', 'lux': 'https://unsplash.com/photos/F6romjSOMRU/download?force=true', 'cloth': 'https://images.unsplash.com/photo-1732357624591-f2137085659b?auto=format&fit=crop&w=1400&q=80'};
const views = [
  ['home','Home'],['packages','Packages'],['book','Book Now'],['gallery','Results'],['reviews','Reviews'],['track','Track']
];
let active='home', step=0;
let data = { packages: [], addons: [], reviews: [], gallery: [], coupons: [], settings: {} };
let bookingMemory = [];
let state = {vehicle:'Sedan', packageId:'full', addons:[], coupon:'', photos:0};
const seedPackages = [
  {id:'basic', name:'Basic Refresh', badge:'Routine Maintenance', description:'Perfect for maintenance cleaning.', duration:'1.5–2 hours', featured:false, premium:false, image:IMG.wash, prices:{'Sedan':99,'Small SUV':119,'Large SUV / Truck':139,'Large Truck':159,'Motorcycle':79,'RV':0,'Boat / Trailer':0}, features:['Exterior hand wash','Wheels & tire shine','Quick interior vacuum','Dash & surface wipe down','Interior windows']},
  {id:'full', name:'Full Detail', badge:'Most Popular', description:'The most requested inside-and-out detail.', duration:'3–4 hours', featured:true, premium:false, image:IMG.interior, prices:{'Sedan':179,'Small SUV':199,'Large SUV / Truck':229,'Large Truck':249,'Motorcycle':129,'RV':0,'Boat / Trailer':0}, features:['Everything in Basic Refresh','Deep interior vacuum','Door jambs cleaned','Interior UV protectant','Premium spray wax','Trim & tire shine']},
  {id:'premium', name:'Premium Detail', badge:'Showroom Level Clean', description:'A premium detail built for a luxury finish.', duration:'5–6 hours', featured:false, premium:true, image:IMG.paint, prices:{'Sedan':249,'Small SUV':279,'Large SUV / Truck':299,'Large Truck':349,'Motorcycle':179,'RV':0,'Boat / Trailer':0}, features:['Everything in Full Detail','Shampoo seats & carpets','Leather cleaning & conditioning','Clay bar treatment','Light engine bay cleaning']},
  {id:'specialty', name:'Specialty Vehicle', badge:'Request Quote', description:'Motorcycles, RVs, boats, trailers and custom work.', duration:'Manual review', featured:false, premium:false, image:IMG.wheel, prices:{'Sedan':0,'Small SUV':0,'Large SUV / Truck':0,'Large Truck':0,'Motorcycle':175,'RV':300,'Boat / Trailer':0}, features:['Oversized vehicle review','Photo-based estimate','Custom service plan','Final price confirmed before service']}
];
const seedAddons = [
  {id:'pet',name:'Pet Hair Removal',label:'$25–$75',price:25,variable:true,description:'Extra extraction for seats, carpets and cargo areas.'},
  {id:'stain',name:'Stain Removal',label:'$25+',price:25,variable:true,description:'Spot treatment for visible stains.'},
  {id:'odor',name:'Odor Elimination',label:'$50',price:50,description:'Odor treatment for smoke, food, pets or moisture.'},
  {id:'headlight',name:'Headlight Restoration',label:'$75',price:75,description:'Restore faded headlights.'},
  {id:'engine',name:'Engine Bay Detail',label:'$50',price:50,description:'Light engine bay cleaning.'},
  {id:'wax',name:'Wax Protection',label:'Starting at $100',price:100,variable:true,description:'Added paint protection and gloss.'},
  {id:'ceramic',name:'Ceramic Coating',label:'Starting at $250',price:250,variable:true,description:'Premium paint protection.'},
  {id:'paint',name:'Paint Correction',label:'Starting at $300',price:300,variable:true,description:'Gloss correction and defect reduction.'}
];
const seedReviews = [
  {name:'Marcus T.',rating:5,service:'Full Detail',text:'The interior came back cleaner than when I bought it. Easy booking and great communication.'},
  {name:'Ashley R.',rating:5,service:'Premium Detail',text:'They came to my workplace and the finish looked amazing. Worth every dollar.'},
  {name:'David M.',rating:5,service:'Basic Refresh',text:'Fast, professional and the truck looked sharp again. I will book again.'}
];
const vehicles = ['Sedan','Small SUV','Large SUV / Truck','Large Truck','Motorcycle','RV','Boat / Trailer'];
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const money = n => Number(n||0) ? '$' + Number(n).toFixed(0) : 'Quote';
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
function api(action, params={}){
  return new Promise((resolve,reject)=>{
    const cb = 'aa_cb_' + Math.random().toString(36).slice(2);
    const q = new URLSearchParams({action, callback:cb, ...params});
    const s = document.createElement('script');
    const timer = setTimeout(()=>{cleanup(); reject(new Error('timeout'));}, 9000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; s.remove(); }
    window[cb] = res => {cleanup(); resolve(res);};
    s.onerror = () => {cleanup(); reject(new Error('network'));};
    s.src = API_URL + '?' + q.toString();
    document.body.appendChild(s);
  });
}
function pkgs(){ return (data.packages && data.packages.length ? data.packages : seedPackages).filter(p=>p.visible!==false); }
function addons(){ return (data.addons && data.addons.length ? data.addons : seedAddons).filter(a=>a.visible!==false); }
function reviews(){ const r=(data.reviews&&data.reviews.length?data.reviews:seedReviews).filter(x=>!x.status||String(x.status).toLowerCase()==='approved'); return r.length?r:seedReviews; }
function pkg(){ return pkgs().find(p=>p.id===state.packageId) || pkgs()[0]; }
function basePrice(){ return Number((pkg().prices||{})[state.vehicle] || 0); }
function selectedAddons(){ return addons().filter(a=>state.addons.includes(a.id)); }
function subtotal(){ return basePrice() + selectedAddons().reduce((s,a)=>s+Number(a.price||0),0); }
function discount(){ const c=String(state.coupon||'').toUpperCase(); if(c==='FIRST20') return Math.round(subtotal()*0.20); if(c==='FULL149' && pkg().id==='full' && state.vehicle==='Sedan') return Math.max(0, subtotal()-149); return 0; }
function travelFee(){ return 15; }
function total(){ return Math.max(0, subtotal()-discount()+travelFee()); }
function deposit(){ return Math.round(total()*0.10); }
function go(id){ active=id; $$('.view').forEach(v=>v.classList.remove('active')); $('#' + id + 'View').classList.add('active'); renderNav(); renderActive(); $('#main').scrollTop=0; }
function renderNav(){ $('#nav').innerHTML=views.map(v=>`<button class="${v[0]===active?'active':''}" data-go="${v[0]}">${v[1]}</button>`).join(''); }
function packageImage(p){ return p.image || (p.id==='basic'?IMG.wash:p.id==='full'?IMG.interior:p.id==='premium'?IMG.paint:IMG.wheel); }
function packageCard(p){ const price=(p.prices||{})[state.vehicle] || (p.prices||{}).Sedan || 0; return `<article class="pkg ${p.featured?'featured':''} ${p.premium?'premium':''}"><div class="pkg-img"><img loading="lazy" src="${packageImage(p)}" alt="${p.name}"></div><div class="pkg-title"><div><span class="badge ${p.premium?'purple':''}">${p.badge||''}</span><h3>${p.name}</h3><p class="desc">${p.description||''}</p></div><div class="from">from<b>${money(price)}</b></div></div><div class="price-list">${vehicles.slice(0,4).map(v=>`<div class="row"><span>${v}</span><strong>${money((p.prices||{})[v])}</strong></div>`).join('')}</div><div class="feature-list">${(p.features||[]).map(f=>`<div class="feature"><span class="dot"></span><span>${f}</span></div>`).join('')}</div><button class="btn ${p.featured?'primary':'ghost'}" data-select-pkg="${p.id}">Select Package</button></article>`; }
function renderHome(){ $('#homeView').innerHTML = `<div class="hero"><span class="eyebrow">Jacksonville's Premier Mobile Detailing Service</span><h2>Clean inside. <span>Shine outside.</span></h2><p>We come to you with professional mobile detailing, flexible scheduling, premium products and a booking flow made for fast quotes.</p><div class="actions"><button class="btn primary" data-go="book">Book Mobile Detail</button><button class="btn ghost" data-go="packages">View Packages</button><a class="btn ghost" href="tel:9046018480">Call / Text</a></div><div class="trust"><div><b>Save Time</b>We come to you</div><div><b>Fully Insured</b>Professional service</div><div><b>Premium Finish</b>High-end result</div><div><b>Jacksonville Area</b>Mobile service</div><div><b>Guaranteed</b>Satisfaction focused</div></div></div>`; }
function renderSide(){ $('#sidePanel').innerHTML = `<div class="side-card"><span class="badge">Why Auto Armor</span><h3>Mobile detailing that feels organized before arrival.</h3><p class="hint">Customers can book online, upload vehicle photos, receive a QR confirmation, track service status and leave a review after completion.</p><div class="side-photo"><img src="${IMG.lux}" alt="Detailer finishing luxury vehicle"></div></div><div class="side-card"><h3>Simple process</h3><div class="process" style="grid-template-columns:1fr"><div class="card"><span class="num">1</span><h3>Choose service</h3><p>Vehicle, package and add-ons.</p></div><div class="card"><span class="num">2</span><h3>Pick schedule</h3><p>Requested day and time.</p></div><div class="card"><span class="num">3</span><h3>We come to you</h3><p>Service status and QR confirmation.</p></div></div></div><div class="side-card"><h3>Follow the work</h3><p class="hint">See recent detailing results and connect on Instagram.</p><a class="btn primary" style="margin-top:12px" href="https://www.instagram.com/autoarmor.de" target="_blank" rel="noopener">Open Instagram</a></div>`; }
function renderPackages(){ $('#packagesView').innerHTML = `<div class="panel"><div class="section-head"><div><span class="badge">Detailing Packages</span><h2>Choose the right clean.</h2></div><p>Package pricing updates by vehicle type. Specialty vehicles and heavy conditions can be quoted after photo review.</p></div><div class="choice-grid" style="margin-bottom:14px">${vehicles.map(v=>`<button class="choice ${state.vehicle===v?'active':''}" data-vehicle="${v}"><span class="choice-mark"></span><b>${v}</b><span>${v.includes('RV')||v.includes('Boat')?'Request quote':'Instant estimate'}</span></button>`).join('')}</div><div class="pkg-grid">${pkgs().map(packageCard).join('')}</div></div>`; }
function renderBook(){ const p=pkg(); const titles=['Vehicle','Package','Add-ons','Service Details','Photos','Review']; $('#bookView').innerHTML = `<div class="book-wrap"><aside class="steps">${titles.map((t,i)=>`<button class="step ${step===i?'active':''}" data-step="${i}">${i+1}. ${t}</button>`).join('')}</aside><section class="book-card">${bookStep()}<div class="actions" style="margin-top:16px">${step>0?'<button class="btn ghost" data-prev>Back</button>':''}${step<5?'<button class="btn primary" data-next>Continue</button>':'<button class="btn primary" id="reserveBtn">Reserve Now</button>'}</div></section></div>`; renderSummaryBox(); }
function bookStep(){ if(step===0) return `<span class="badge">Step 1</span><h2 style="margin:10px 0 8px">Choose Your Vehicle</h2><p class="hint" style="margin-bottom:14px">The estimate updates based on vehicle type.</p><div class="choice-grid">${vehicles.map(v=>`<button class="choice ${state.vehicle===v?'active':''}" data-vehicle="${v}"><span class="choice-mark"></span><b>${v}</b><span>${v==='RV'?'Starting at $300':v==='Boat / Trailer'?'Call for quote':v==='Motorcycle'?'Starting at $175':'Package pricing'}</span></button>`).join('')}</div>`;
 if(step===1) return `<span class="badge">Step 2</span><h2 style="margin:10px 0 8px">Choose Your Package</h2><div class="pkg-grid" style="grid-template-columns:repeat(2,1fr)">${pkgs().map(p=>`<article class="pkg ${state.packageId===p.id?'featured':''}"><div class="pkg-img"><img src="${packageImage(p)}" alt="${p.name}"></div><div class="pkg-title"><div><span class="badge">${p.badge||''}</span><h3>${p.name}</h3><p class="desc">${p.duration||''}</p></div><div class="from">estimate<b>${money((p.prices||{})[state.vehicle])}</b></div></div><button class="btn ${state.packageId===p.id?'primary':'ghost'}" data-select-pkg="${p.id}">${state.packageId===p.id?'Selected':'Select'}</button></article>`).join('')}</div>`;
 if(step===2) return `<span class="badge">Step 3</span><h2 style="margin:10px 0 8px">Add Extra Services</h2><p class="hint" style="margin-bottom:14px">Variable add-ons are estimates. Final price may be adjusted after vehicle inspection.</p><div class="choice-grid">${addons().map(a=>`<button class="choice ${state.addons.includes(a.id)?'active':''}" data-addon="${a.id}"><span class="choice-mark"></span><b>${a.name}</b><span>${a.label||money(a.price)} · ${a.description||''}</span></button>`).join('')}</div>`;
 if(step===3) return `<span class="badge">Step 4</span><h2 style="margin:10px 0 8px">Address & Availability</h2><div class="form-grid"><div class="field"><label>Full Name</label><input id="customerName" required></div><div class="field"><label>Phone</label><input id="phone" inputmode="tel" required></div><div class="field"><label>Email</label><input id="email" type="email" required></div><div class="field"><label>Vehicle Details</label><input id="vehicleInfo" placeholder="Year, make, model"></div><div class="field full"><label>Service Address</label><input id="address" required></div><div class="field"><label>City</label><input id="city" value="Jacksonville"></div><div class="field"><label>Service Location</label><select id="locationType"><option>Home</option><option>Work</option><option>Apartment</option><option>Business Parking Lot</option><option>Other</option></select></div><div class="field"><label>Desired Date</label><input id="apptDate" type="date" required></div><div class="field"><label>Preferred Time</label><select id="apptTime"><option>8:00 AM</option><option>10:00 AM</option><option>12:00 PM</option><option>2:00 PM</option><option>4:00 PM</option></select></div><div class="field full"><label>Notes</label><textarea id="notes" placeholder="Heavy pet hair, stains, gated community, workplace instructions..."></textarea></div></div><p class="hint" style="margin-top:12px">Serving Jacksonville & surrounding areas. Travel fee may apply depending on distance. Fully mobile setup available.</p>`;
 if(step===4) return `<span class="badge">Step 5</span><h2 style="margin:10px 0 8px">Vehicle Photos</h2><p class="hint" style="margin-bottom:14px">Photos help confirm the service level before arrival. Images are compressed before upload.</p><div class="upload-grid">${['Exterior','Interior front','Interior back','Trunk','Seats / stains','Pet hair','Wheels'].map(x=>`<label class="upload"><b>${x}</b><span class="hint">Tap to add</span><input type="file" accept="image/*"></label>`).join('')}</div>`;
 return `<span class="badge">Step 6</span><h2 style="margin:10px 0 8px">Review & Reserve</h2><div id="summaryBox"></div><div class="field" style="margin-top:12px"><label>Coupon Code</label><div class="actions"><input id="couponCode" placeholder="FIRST20" value="${state.coupon}"><button class="btn ghost" id="applyCoupon">Apply</button></div></div><div class="policy"><input id="agreePolicy" type="checkbox"><div><b>Service agreement, deposit and cancellation terms</b><p class="hint">Deposit is applied to the final balance. Appointment requests are confirmed after review. Same-day cancellations, inaccessible vehicles, unsafe conditions or major condition changes may affect deposit, travel fee or final price. Estimate is based on selected vehicle, package, add-ons and photos.</p></div></div>`; }
function renderSummaryBox(){ const box=$('#summaryBox'); if(!box) return; box.innerHTML = `<div class="summary"><div class="row"><span>Vehicle</span><strong>${state.vehicle}</strong></div><div class="row"><span>Package</span><strong>${pkg().name}</strong></div><div class="row"><span>Add-ons</span><strong>${selectedAddons().length?selectedAddons().map(a=>a.name).join(', '):'None'}</strong></div><div class="row"><span>Subtotal</span><strong>${money(subtotal())}</strong></div><div class="row"><span>Coupon</span><strong>${discount()?'-'+money(discount()):'None'}</strong></div><div class="row"><span>Travel Fee</span><strong>${money(travelFee())}</strong></div><div class="row"><span>Deposit</span><strong>${money(deposit())}</strong></div><div class="row total"><span>Estimated Total</span><strong>${money(total())}</strong></div></div>`; }
function renderGallery(){ const defaults=[
 ['Paint Correction Finish','Premium Detail',IMG.buffer,'Machine polish and gloss-focused finish.'],['Interior Reset','Full Detail',IMG.interior,'Seats, panels, vents and trim cleaned for a sharp cabin.'],['Wheel & Tire Detail','Basic Refresh',IMG.wheel,'Wheel faces, tires and trim refreshed.'],['Exterior Foam Wash','Basic Refresh',IMG.wash,'Safe hand wash for routine maintenance.'],['Luxury Finish','Premium Detail',IMG.lux,'Final wipe down for a deep reflective finish.']
]; const rows=(data.gallery||[]).filter(g=>g.visible!==false && (g.beforeFileId||g.afterFileId)).map(g=>[g.title,g.service,g.afterFileId||g.beforeFileId,g.description]); const list=rows.length?rows:defaults; $('#galleryView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Results Gallery</span><h2>Real detail-focused visuals.</h2></div><p>Some results show transformation pairs. Others show finished service photos from detail work.</p></div><div class="gallery-grid">${list.map((g,i)=>`<article class="gallery-card ${i===0?'big':''}"><div class="gallery-media"><img loading="lazy" src="${g[2]}" alt="${g[0]}"></div><div class="gallery-body"><span class="badge ${i===0?'purple':''}">${g[1]||'Detail Service'}</span><h3>${g[0]}</h3><p class="hint">${g[3]||''}</p></div></article>`).join('')}</div></div>`; }
function renderReviews(){ const list=reviews(); $('#reviewsView').innerHTML=`<div class="panel"><div class="section-head"><div><span class="badge">Customer Reviews</span><h2>What customers say.</h2></div></div><div class="review-grid">${list.map(r=>`<article class="review"><div class="stars">${'★'.repeat(Number(r.rating||5))}</div><p>“${r.text}”</p><b>${r.name}</b><span class="small">${r.service||'Detail Service'}</span></article>`).join('')}</div><div class="panel" style="margin-top:14px;box-shadow:none"><h2 style="font-size:26px">Share Your Experience</h2><div class="form-grid" style="margin-top:12px"><div class="field"><label>Name</label><input id="reviewName"></div><div class="field"><label>Rating</label><select id="reviewRating"><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select></div><div class="field full"><label>Service</label><input id="reviewService" placeholder="Full Detail"></div><div class="field full"><label>Review</label><textarea id="reviewText"></textarea></div></div><button class="btn primary" id="sendReview" style="margin-top:12px">Post Review</button></div></div>`; }
async function renderTrack(id=''){ let b = bookingMemory.find(x=>x.id.toUpperCase()===String(id).toUpperCase()) || bookingMemory[0]; if(id){ try{ const res=await api('getBooking',{id}); if(res.ok) b=res.booking; }catch(e){} } const statuses=['Request Received','Price Confirmed','Appointment Scheduled','Technician On The Way','Service Started','Final Review','Completed']; let html=`<div class="track-wrap"><div class="panel"><span class="badge">Service Tracking</span><h2 style="margin:10px 0">Track Your Detail</h2><div class="field"><label>Confirmation Number</label><input id="trackCode" placeholder="AA-12345" value="${id||''}"></div><button class="btn primary" id="trackBtn" style="margin-top:10px;width:100%">Track Service</button><p class="hint" style="margin-top:12px">Use the confirmation number from your booking email or QR.</p></div>`; if(!b){ $('#trackView').innerHTML=html+`<div class="panel"><h2>No service found yet.</h2><p class="hint">Create a booking request first, then your QR and status timeline will appear here.</p></div></div>`; return; } const activeIndex=Math.max(0,statuses.indexOf(b.status)); const proposal=b.proposal&&b.proposal.status==='pending'?`<div class="proposal"><h3>New appointment time available</h3><p class="hint"><b>${b.proposal.date} at ${b.proposal.time}</b><br>${b.proposal.reason||''}</p><div class="actions"><button class="btn primary small" data-proposal="accepted" data-id="${b.id}">Accept</button><button class="btn ghost small" data-proposal="canceled" data-id="${b.id}">Cancel</button><a class="btn gold small" href="tel:9046018480">Call</a></div></div>`:''; html+=`<div class="track-card panel">${proposal}<div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(b.qrData||b.id)}" alt="Service QR"></div><div class="summary"><div class="row"><span>Confirmation</span><strong>${b.id}</strong></div><div class="row"><span>Package</span><strong>${b.packageName}</strong></div><div class="row"><span>Date / Time</span><strong>${b.appointmentDate||'Pending'} · ${b.appointmentTime||''}</strong></div><div class="row total"><span>Total</span><strong>${money(b.total)}</strong></div></div><div class="status-list" style="margin-top:14px">${statuses.map((s,i)=>`<div class="status ${i<=activeIndex?'done':''}"><span class="node"></span><div><b>${s}</b><p class="hint">${i<=activeIndex?'Updated':'Pending'}</p></div></div>`).join('')}</div><div class="actions" style="margin-top:14px"><button class="btn small" data-go="reviews">Leave Review</button><a class="btn small ghost" href="tel:9046018480">Call / Text</a></div></div></div>`; $('#trackView').innerHTML=html; }
function renderActive(){ if(active==='home') renderHome(); if(active==='packages') renderPackages(); if(active==='book') renderBook(); if(active==='gallery') renderGallery(); if(active==='reviews') renderReviews(); if(active==='track') renderTrack(new URLSearchParams(location.search).get('track')||''); renderSide(); }
async function compress(file){ return new Promise(res=>{ const reader=new FileReader(); const img=new Image(); reader.onload=e=>{ img.onload=()=>{ const c=document.createElement('canvas'); const max=1400; const scale=Math.min(1,max/Math.max(img.width,img.height)); c.width=img.width*scale; c.height=img.height*scale; c.getContext('2d').drawImage(img,0,0,c.width,c.height); res(c.toDataURL('image/jpeg',.78)); }; img.src=e.target.result; }; reader.readAsDataURL(file); }); }
async function reserve(){ renderSummaryBox(); if(!$('#agreePolicy')?.checked){toast('Please accept the service terms.');return} const need=['customerName','phone','email','address','apptDate']; for(const id of need){ if(!$('#'+id)?.value.trim()){toast('Please complete required details.');step=3;renderBook();return} } const id='AA-'+Math.floor(10000+Math.random()*90000); const b={id,qrData:id,status:'Request Received',createdAt:new Date().toISOString(),customerName:$('#customerName').value,phone:$('#phone').value,email:$('#email').value,vehicleType:state.vehicle,vehicleInfo:$('#vehicleInfo').value,packageId:pkg().id,packageName:pkg().name,addonNames:selectedAddons().map(a=>a.name),addons:selectedAddons(),coupon:state.coupon,subtotal:subtotal(),discount:discount(),travelFee:travelFee(),total:total(),depositPaid:deposit(),balance:total()-deposit(),address:$('#address').value,city:$('#city').value,locationType:$('#locationType').value,appointmentDate:$('#apptDate').value,appointmentTime:$('#apptTime').value,notes:$('#notes').value,photoCount:state.photos}; bookingMemory.unshift(b); api('createBooking',{bookingJson:JSON.stringify(b)}).catch(()=>{}); toast('Booking request received: '+id); go('track'); setTimeout(()=>renderTrack(id),0); }
document.addEventListener('click', e=>{ const g=e.target.closest('[data-go]'); if(g){ e.preventDefault(); go(g.dataset.go); return; } const v=e.target.closest('[data-vehicle]'); if(v){ state.vehicle=v.dataset.vehicle; renderActive(); return; } const sp=e.target.closest('[data-select-pkg]'); if(sp){ state.packageId=sp.dataset.selectPkg; if(active==='packages') go('book'); else renderActive(); return; } const add=e.target.closest('[data-addon]'); if(add){ state.addons=state.addons.includes(add.dataset.addon)?state.addons.filter(x=>x!==add.dataset.addon):[...state.addons,add.dataset.addon]; renderActive(); return; } const st=e.target.closest('[data-step]'); if(st){ step=Number(st.dataset.step); renderBook(); return; } if(e.target.closest('[data-next]')){ if(step<5) step++; renderBook(); return; } if(e.target.closest('[data-prev]')){ if(step>0) step--; renderBook(); return; } if(e.target.id==='applyCoupon'){ state.coupon=$('#couponCode').value.trim().toUpperCase(); renderSummaryBox(); toast(state.coupon?'Coupon checked.':'No coupon entered.'); return; } if(e.target.id==='reserveBtn'){ reserve(); return; } if(e.target.id==='trackBtn'){ renderTrack($('#trackCode').value.trim()); return; } if(e.target.id==='sendReview'){ const text=$('#reviewText').value.trim(); if(!text){toast('Write your review first.');return} const r={id:'R-'+Date.now(),name:$('#reviewName').value||'Customer',rating:Number($('#reviewRating').value||5),service:$('#reviewService').value||'Detail Service',text,status:'pending',featured:false,createdAt:new Date().toISOString()}; api('submitReview',{reviewJson:JSON.stringify(r)}).catch(()=>{}); toast('Thank you for sharing your experience.'); $('#reviewText').value=''; return; } const pr=e.target.closest('[data-proposal]'); if(pr){ const b=bookingMemory.find(x=>x.id===pr.dataset.id); api('respondScheduleProposal',{id:pr.dataset.id,response:pr.dataset.proposal}).catch(()=>{}); if(b){ if(pr.dataset.proposal==='accepted'){ b.appointmentDate=b.proposal.date; b.appointmentTime=b.proposal.time; b.status='Appointment Scheduled'; } else b.status='Canceled'; } toast(pr.dataset.proposal==='accepted'?'New time accepted.':'Request canceled.'); renderTrack(pr.dataset.id); } });
document.addEventListener('change', async e=>{ if(e.target.type==='file' && e.target.files[0]){ const wrap=e.target.closest('.upload'); wrap.querySelector('span').textContent='Preparing photo...'; await compress(e.target.files[0]); state.photos++; wrap.querySelector('span').textContent='Photo ready'; toast('Photo ready.'); } });
async function init(){ renderNav(); renderActive(); try{ const res=await api('getPublicData'); if(res.ok){ data=res; renderActive(); } }catch(e){} const track=new URLSearchParams(location.search).get('track'); if(track){ go('track'); renderTrack(track); } } init();
</script>
